<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Trắc nghiệm Cấp số cộng - Cấp số nhân</title>
    <style>
        :root {
            --bg-gradient-start: #0b3b5f;
            --bg-gradient-end: #1b4f72;
            --primary-color: #0b3b5f;
            --secondary-color: #2c9c8c;
            --text-color: #0b3b5f;
            --bg-card: #ffffff;
            --bg-option: #f8fafc;
            --bg-option-hover: #d9eef5;
            --bg-info: #eef2f7;
            --border-color: #cbd5e1;
            --correct-color: #10b981;
            --wrong-color: #ef4444;
            --shadow-sm: 0 4px 12px rgba(0,0,0,0.05);
            --shadow-lg: 0 25px 50px -12px rgba(0,0,0,0.25);
        }

        [data-theme="dark"] {
            --bg-gradient-start: #0f172a;
            --bg-gradient-end: #1e293b;
            --primary-color: #3b82f6;
            --secondary-color: #14b8a6;
            --text-color: #e2e8f0;
            --bg-card: #1e293b;
            --bg-option: #334155;
            --bg-option-hover: #475569;
            --bg-info: #334155;
            --border-color: #475569;
            --shadow-sm: 0 4px 12px rgba(0,0,0,0.3);
            --shadow-lg: 0 25px 50px -12px rgba(0,0,0,0.5);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', 'Poppins', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.3s ease;
        }

        .password-screen {
            background: var(--bg-card);
            border-radius: 32px;
            box-shadow: var(--shadow-lg);
            padding: 40px 30px;
            max-width: 450px;
            width: 90%;
            text-align: center;
            animation: fadeIn 0.6s ease;
        }

        .password-screen h2 {
            color: var(--text-color);
            margin-bottom: 15px;
            font-size: 1.8rem;
        }

        .password-screen p {
            color: var(--text-color);
            margin-bottom: 25px;
        }

        .password-input {
            width: 100%;
            padding: 14px 18px;
            font-size: 1rem;
            border: 2px solid var(--border-color);
            border-radius: 60px;
            outline: none;
            transition: 0.2s;
            margin-bottom: 20px;
            background: var(--bg-option);
            color: var(--text-color);
        }

        .password-input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(27,79,114,0.2);
        }

        .password-btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 28px;
            font-size: 1rem;
            border-radius: 60px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            transition: 0.2s;
        }

        .password-btn:hover {
            background: var(--secondary-color);
            transform: scale(1.02);
        }

        .error-msg {
            color: var(--wrong-color);
            margin-top: 15px;
            font-size: 0.9rem;
            display: none;
        }

        .quiz-container {
            max-width: 1000px;
            width: 100%;
            margin: 0 auto;
            background: var(--bg-card);
            border-radius: 32px;
            box-shadow: var(--shadow-lg);
            padding: 30px 35px;
            display: none;
            animation: fadeInUp 0.6s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .header-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .timer {
            background: var(--bg-info);
            padding: 10px 20px;
            border-radius: 60px;
            font-weight: bold;
            color: var(--text-color);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .theme-toggle {
            background: var(--bg-info);
            border: none;
            padding: 10px 20px;
            border-radius: 60px;
            cursor: pointer;
            font-size: 1.2rem;
            transition: 0.2s;
        }

        .theme-toggle:hover {
            transform: scale(1.1);
        }

        .title-wrapper {
            text-align: center;
            margin-bottom: 15px;
        }

        h1 {
            font-size: 2rem;
            color: var(--text-color);
            border-bottom: 4px solid var(--secondary-color);
            display: inline-block;
            padding-bottom: 10px;
        }

        .info {
            background: var(--bg-info);
            padding: 12px 20px;
            border-radius: 60px;
            margin: 20px 0 25px;
            font-size: 1rem;
            text-align: center;
            color: var(--text-color);
            font-weight: 500;
        }

        .progress-area {
            background: var(--border-color);
            border-radius: 40px;
            margin-bottom: 25px;
            padding: 3px;
        }

        .progress-bar {
            background: var(--secondary-color);
            width: 0%;
            height: 12px;
            border-radius: 40px;
            transition: width 0.3s ease;
            text-align: right;
            padding-right: 8px;
            line-height: 12px;
            color: white;
            font-size: 9px;
            font-weight: bold;
        }

        .question-card {
            background: var(--bg-card);
            border-left: 7px solid var(--secondary-color);
            margin-bottom: 24px;
            padding: 18px 22px;
            border-radius: 24px;
            box-shadow: var(--shadow-sm);
            transition: all 0.25s ease;
            border: 1px solid var(--border-color);
        }

        .question-card:hover {
            transform: translateX(5px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        .question-card.correct {
            border-left-color: var(--correct-color);
            background: rgba(16, 185, 129, 0.05);
        }

        .question-card.wrong {
            border-left-color: var(--wrong-color);
            background: rgba(239, 68, 68, 0.05);
        }

        .question-text {
            font-weight: 700;
            font-size: 1.05rem;
            margin-bottom: 14px;
            color: var(--text-color);
        }

        .options {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-left: 12px;
        }

        .option {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            font-size: 0.95rem;
            padding: 6px 12px;
            background: var(--bg-option);
            border-radius: 40px;
            transition: all 0.2s;
            color: var(--text-color);
        }

        .option:hover {
            background: var(--bg-option-hover);
            transform: translateX(3px);
        }

        .option.correct-answer {
            background: rgba(16, 185, 129, 0.2);
            border: 2px solid var(--correct-color);
            font-weight: bold;
        }

        .option.wrong-answer {
            background: rgba(239, 68, 68, 0.2);
            border: 2px solid var(--wrong-color);
        }

        .option input {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--secondary-color);
        }

        .option input:disabled {
            cursor: not-allowed;
        }

        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin: 35px 0 20px;
        }

        button {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 14px 32px;
            font-size: 1.1rem;
            border-radius: 60px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
            min-width: 180px;
        }

        button:hover {
            background: var(--secondary-color);
            transform: scale(1.02);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        button.secondary {
            background: #6c757d;
        }

        button.secondary:hover {
            background: #5a6268;
        }

        .result {
            text-align: center;
            background: var(--bg-info);
            color: var(--text-color);
            padding: 25px;
            border-radius: 24px;
            font-size: 1.3rem;
            font-weight: bold;
            margin-top: 25px;
            display: none;
            animation: bounceIn 0.5s;
        }

        @keyframes bounceIn {
            0% { transform: scale(0.9); opacity: 0; }
            80% { transform: scale(1.02); }
            100% { transform: scale(1); opacity: 1; }
        }

        .result span {
            color: var(--secondary-color);
            font-size: 1.8rem;
        }

        .result-details {
            margin-top: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            font-size: 1rem;
        }

        .stat-box {
            background: var(--bg-card);
            padding: 15px;
            border-radius: 16px;
            box-shadow: var(--shadow-sm);
        }

        .stat-box .label {
            font-size: 0.85rem;
            opacity: 0.8;
            margin-bottom: 5px;
        }

        .stat-box .value {
            font-size: 1.5rem;
            font-weight: bold;
        }

        footer {
            text-align: center;
            margin-top: 35px;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--secondary-color);
            border-top: 1px solid var(--border-color);
            padding-top: 20px;
        }

        .review-section {
            display: none;
            margin-top: 25px;
            padding: 20px;
            background: var(--bg-info);
            border-radius: 24px;
        }

        .review-section h3 {
            color: var(--text-color);
            margin-bottom: 15px;
            text-align: center;
        }

        @media (max-width: 600px) {
            .quiz-container {
                padding: 18px;
            }
            .options {
                flex-direction: column;
                gap: 10px;
            }
            h1 {
                font-size: 1.6rem;
            }
            .button-group {
                flex-direction: column;
            }
            button {
                width: 100%;
            }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>
</head>
<body>

<!-- Màn hình nhập mật khẩu -->
<div id="passwordScreen" class="password-screen">
    <h2>🔐 KHU VỰC TRẮC NGHIỆM</h2>
    <p>Vui lòng nhập mật khẩu để tiếp tục</p>
    <input type="password" id="passwordInput" class="password-input" placeholder="Mật khẩu" autocomplete="off">
    <button id="unlockBtn" class="password-btn">MỞ KHÓA</button>
    <div id="errorMsg" class="error-msg">⚠️ Sai mật khẩu, thử lại!</div>
</div>

<!-- Nội dung chính (bài trắc nghiệm) -->
<div id="quizContainer" class="quiz-container">
    <div class="header-controls">
        <div class="timer" id="timer">
            ⏱️ <span id="timerDisplay">00:00</span>
        </div>
        <button class="theme-toggle" id="themeToggle" title="Chuyển chế độ sáng/tối">🌓</button>
    </div>

    <div class="title-wrapper">
        <h1>📘 CẤP SỐ CỘNG - CẤP SỐ NHÂN</h1>
    </div>
    <div class="info" id="infoBox">
        ✅ Đề gồm <strong>40 câu trắc nghiệm</strong>.<br>
        📌 Chọn đáp án, bấm "NỘP BÀI" để xem kết quả.
    </div>
    <div class="progress-area">
        <div class="progress-bar" id="progressBar">0%</div>
    </div>

    <form id="quizForm">
        <div id="questions-container"></div>
        <div class="button-group">
            <button type="button" id="submitBtn">📝 NỘP BÀI</button>
            <button type="button" id="resetBtn" class="secondary">🔄 LÀM LẠI</button>
            <button type="button" id="incompleteBtn" class="secondary">⚠️ XEM CÂU CHƯA LÀM</button>
        </div>
    </form>
    
    <div id="result" class="result"></div>
    
    <div id="reviewSection" class="review-section">
        <h3>📋 XEM LẠI CÂU SAI</h3>
        <div class="button-group">
            <button type="button" id="showWrongBtn">Hiển thị câu sai</button>
            <button type="button" id="exportBtn" class="secondary">💾 Xuất kết quả</button>
        </div>
    </div>
    
    <footer>🎯 ĐẬU NV1 CÙNG ANH TIẾN ĐẠT</footer>
</div>

<script>
    (function() {
        // ========== MẬT KHẨU (SO SÁNH TRỰC TIẾP) ==========
        const CORRECT_PASSWORD = "tamduc";

        // ========== CÂU HỎI (40 câu, ID 1..40) ==========
        const questionsData = [
            { id: 1, text: "Cho cấp số cộng 2;5;8;11;14... Công sai của cấp số cộng đã cho bằng", options: ["-3", "3", "2", "14"], correct: "B" },
            { id: 2, text: "Trong các dãy số sau, dãy số nào không là cấp số cộng?", options: ["2;0;-2;-4;-5", "1/2; -1/2; -3/2; -5/2; -7/2", "√2; √2; √2; √2; √2", "-7;-4;-1;2;5"], correct: "A" },
            { id: 3, text: "Công thức tính số hạng tổng quát của cấp số cộng với công sai d và số hạng đầu u₁ là", options: ["uₙ = n.u₁ + n(n-1)d", "uₙ = u₁ + (n-1)d", "uₙ = u₁ + n(n-1)d/2", "uₙ = n.u₁ + n(n-1)d/2"], correct: "B" },
            { id: 4, text: "Cho cấp số cộng (uₙ) với u₁ = 9 và công sai d = 2. Giá trị của u₂ bằng", options: ["11", "9/2", "18", "7"], correct: "A" },
            { id: 5, text: "Cho cấp số cộng (uₙ) với u₁ = 5; u₂ = 10. Công sai của cấp số cộng đã cho bằng", options: ["-5", "5", "2", "15"], correct: "B" },
            { id: 6, text: "Cho cấp số cộng (uₙ) với u₁ = 2 và u₇ = -10. Công sai của cấp số cộng đã cho bằng", options: ["2", "3", "-1", "-2"], correct: "D" },
            { id: 7, text: "Cho cấp số cộng (uₙ) với u₁ = 1 và u₄ = -26. Công sai của (uₙ) bằng", options: ["-27", "-9", "-26", "∛(-26)"], correct: "B" },
            { id: 8, text: "Cho cấp số cộng (uₙ) với u₁ = 4 và d = 8. Số hạng u₂₀ của cấp số cộng đã cho bằng", options: ["156", "165", "12", "245"], correct: "A" },
            { id: 9, text: "Cho cấp số cộng (uₙ), với u₁ = 2, u₅ = 14. Công sai của cấp số cộng là", options: ["3", "-3", "4", "-4"], correct: "A" },
            { id: 10, text: "Cho cấp số cộng (uₙ), biết u₃ = -2; u₇ = 18. Số hạng u₁₁ bằng", options: ["38", "20", "43", "33"], correct: "A" },
            { id: 11, text: "Cho cấp số cộng (uₙ) với u₁ = 3 và d = -3. Tổng 10 số hạng đầu tiên của cấp số cộng đã cho bằng", options: ["26", "-26", "-105", "105"], correct: "C" },
            { id: 12, text: "Cho cấp số cộng (uₙ) có u₁ = 1 và công sai d = 2. Tổng S₁₀ = u₁+...+u₁₀ bằng", options: ["110", "100", "21", "19"], correct: "B" },
            { id: 13, text: "Cho cấp số cộng (uₙ) có số hạng đầu u₁ = 3 và công sai d = 2. Tổng của 2019 số hạng đầu bằng", options: ["4 080 399", "4 800 399", "4 399 080", "8 154 741"], correct: "A" },
            { id: 14, text: "Một cấp số cộng có số hạng đầu u₁ = 1/3, công sai d = -1. Tổng n số hạng đầu bằng -425. Giá trị của n bằng", options: ["30", "60", "45", "15"], correct: "A" },
            { id: 15, text: "Cho dãy số (uₙ) với uₙ = 2n + 1, số hạng thứ 2019 của dãy là", options: ["4039", "4390", "4930", "4093"], correct: "A" },
            { id: 16, text: "Cho cấp số cộng (uₙ) với u₁ = 2; d = 9. Khi đó số 2018 là số hạng thứ mấy?", options: ["226", "225", "223", "224"], correct: "B" },
            { id: 17, text: "Cho (uₙ) là cấp số cộng có u₄ + u₁₆ = 48. Số hạng u₁₀ bằng", options: ["438", "24", "96", "72"], correct: "B" },
            { id: 18, text: "Cho cấp số cộng (uₙ) biết u₅ + u₇ = 19. Giá trị của u₂ + u₁₀ là", options: ["38", "29", "12", "19"], correct: "D" },
            { id: 19, text: "Cho (uₙ) là cấp số cộng có u₉ = 5u₂ và u₁₃ = 2u₆ + 5. Số hạng đầu u₁ và công sai d là", options: ["u₁ = -3, d = 4", "u₁ = 3, d = 4", "u₁ = 4, d = 3", "u₁ = -4, d = 3"], correct: "B" },
            { id: 20, text: "Trong các dãy số (uₙ) với số hạng tổng quát sau, dãy số nào là cấp số cộng?", options: ["uₙ = 5ⁿ", "uₙ = 2 - 5n", "uₙ = 5ⁿ - 2", "uₙ = 5 + n²"], correct: "B" },
            { id: 21, text: "Trong các dãy số (uₙ) với số hạng tổng quát sau, dãy số nào là cấp số cộng?", options: ["uₙ = 3.2ⁿ", "uₙ = 3 - 2n", "uₙ = 2ⁿ + 3", "uₙ = 2 + n³"], correct: "B" },
            { id: 22, text: "Cho cấp số cộng (uₙ) có u₁₀ = 30 và u₂₀ = 80. Công sai d bằng", options: ["5", "10", "50", "110"], correct: "A" },
            { id: 23, text: "Cho cấp số cộng (uₙ) có u₁ = 5 và tổng của 50 số hạng đầu bằng 5150. Tìm công thức số hạng tổng quát uₙ.", options: ["uₙ = 1 + 4n", "uₙ = 5n", "uₙ = 3 + 2n", "uₙ = 2 + 3n"], correct: "A" },
            { id: 24, text: "Ba số x, y, z theo thứ tự lập thành cấp số cộng. Biết x + y + z = 15 và xyz = 80. Giá trị y bằng", options: ["4", "5", "6", "8"], correct: "B" },
            { id: 25, text: "Cho cấp số nhân (uₙ) với u₁ = 3 và công bội q = 2. Giá trị của u₂ bằng", options: ["8", "9", "6", "3/2"], correct: "C" },
            { id: 26, text: "Cho cấp số nhân (uₙ) với u₁ = 2 và u₂ = 6. Công bội của cấp số nhân đã cho bằng", options: ["3", "-4", "4", "1/3"], correct: "A" },
            { id: 27, text: "Cho cấp số nhân (uₙ) với u₁ = 3; u₂ = 1. Công bội của cấp số nhân đã cho bằng", options: ["1/3", "-2", "3", "2"], correct: "A" },
            { id: 28, text: "Dãy số nào sau đây không phải là cấp số nhân?", options: ["1; -3; 9; -27; 54", "1; 2; 4; 8; 16", "1; -1; 1; -1; 1", "1; -2; 4; -8; 16"], correct: "A" },
            { id: 29, text: "Cho cấp số nhân (uₙ) có u₁ = 5 và công bội q = -1. Số hạng u₆ bằng", options: ["5", "-5", "10", "-10"], correct: "B" },
            { id: 30, text: "Cho cấp số nhân (uₙ) có u₂ = 6 và u₅ = 162. Công bội q bằng (với q > 0)", options: ["2", "3", "4", "6"], correct: "B" },
            { id: 31, text: "Cho cấp số nhân (uₙ) có u₃ = 12 và u₆ = 96. Tổng 6 số hạng đầu S₆ bằng", options: ["189", "378", "126", "252"], correct: "A" },
            { id: 32, text: "Cho cấp số nhân có u₁ = 3, q = -2. Tính u₅", options: ["-6", "-5", "48", "-24"], correct: "C" },
            { id: 33, text: "Cho cấp số nhân (uₙ) có u₁ = 2 và q = 3. Giá trị u₂₀₁₉ bằng", options: ["2·3²⁰¹⁸", "3·2²⁰¹⁸", "2·3²⁰¹⁹", "3·2²⁰¹⁹"], correct: "A" },
            { id: 34, text: "Một cấp số nhân có u₁ = 3, q = 2. Biết Sₙ = 21. Tìm n?", options: ["10", "3", "7", "Không có giá trị"], correct: "B" },
            { id: 35, text: "Cho cấp số nhân (uₙ) biết uₙ = 3ⁿ. Công bội q bằng", options: ["-3", "1/3", "±3", "3"], correct: "D" },
            { id: 36, text: "Cho cấp số nhân (uₙ) có u₁ = 2 và u₆ = 486. Công bội q bằng", options: ["3", "5", "3/2", "2/3"], correct: "A" },
            { id: 37, text: "Cho cấp số nhân (uₙ) có q > 1, u₂ = -3 và u₁+u₂+u₃ = -13. Số hạng đầu u₁ và công bội q là", options: ["u₁=1, q=3", "u₁=-1, q=-3", "u₁=-1, q=3", "u₁=1, q=-3"], correct: "C" },
            { id: 38, text: "Cho cấp số nhân (uₙ) biết u₄ - u₂ = 54 và u₅ - u₃ = 108. Tìm u₁ và q.", options: ["u₁=9, q=2", "u₁=9, q=-2", "u₁=-9, q=-2", "u₁=-9, q=2"], correct: "A" },
            { id: 39, text: "Cho cấp số nhân (uₙ) có u₄+u₆ = -540 và u₃+u₅ = 180. Tính S₂₁.", options: ["½(3²¹+1)", "3²¹-1", "1-3²¹", "-½(3²¹+1)"], correct: "A" },
            { id: 40, text: "Một loại vi khuẩn sau mỗi phút số lượng tăng gấp đôi. Sau 5 phút có 64000 con. Hỏi sau bao nhiêu phút có 2048000 con?", options: ["10", "11", "26", "50"], correct: "A" }
        ];

        // ========== BIẾN TOÀN CỤC ==========
        let timerInterval = null;
        let startTime = null;
        let isQuizSubmitted = false;
        const STORAGE_KEY = 'quizAnswers';
        const TIMESTAMP_KEY = 'quizTimestamp';
        const EXPIRY_DAYS = 7;

        // ========== TIMER ==========
        function startTimer() {
            startTime = Date.now();
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                const elapsed = Math.floor((Date.now() - startTime) / 1000);
                const minutes = Math.floor(elapsed / 60);
                const seconds = elapsed % 60;
                document.getElementById('timerDisplay').textContent = 
                    `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
            }, 1000);
        }
        function stopTimer() {
            if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
        }
        function getElapsedTime() {
            if (!startTime) return "00:00";
            const elapsed = Math.floor((Date.now() - startTime) / 1000);
            const minutes = Math.floor(elapsed / 60);
            const seconds = elapsed % 60;
            return `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
        }

        // ========== THEME ==========
        document.getElementById('themeToggle')?.addEventListener('click', function() {
            const html = document.documentElement;
            const current = html.getAttribute('data-theme');
            const newTheme = current === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        });
        if (localStorage.getItem('theme')) document.documentElement.setAttribute('data-theme', localStorage.getItem('theme'));

        // ========== LOCALSTORAGE CÓ EXPIRY ==========
        function saveAnswersToLocal() {
            const allRadios = document.querySelectorAll('input[type="radio"]');
            const answers = {};
            allRadios.forEach(radio => { if (radio.checked) answers[radio.name] = radio.value; });
            localStorage.setItem(STORAGE_KEY, JSON.stringify(answers));
            localStorage.setItem(TIMESTAMP_KEY, Date.now());
        }
        function restoreAnswersFromLocal() {
            const saved = localStorage.getItem(STORAGE_KEY);
            const timestamp = localStorage.getItem(TIMESTAMP_KEY);
            if (!saved) return false;
            if (timestamp && (Date.now() - parseInt(timestamp) > EXPIRY_DAYS * 24 * 60 * 60 * 1000)) {
                clearSavedAnswers(); return false;
            }
            const answers = JSON.parse(saved);
            let restored = 0;
            for (const [name, value] of Object.entries(answers)) {
                const radio = document.querySelector(`input[name="${name}"][value="${value}"]`);
                if (radio) { radio.checked = true; restored++; }
            }
            if (restored > 0) {
                const infoDiv = document.getElementById('infoBox');
                const orig = infoDiv.innerHTML;
                infoDiv.innerHTML = `🔄 Đã khôi phục ${restored} câu trả lời từ lần trước! 🎉<br>📌 Tiếp tục làm hoặc bấm "NỘP BÀI".`;
                setTimeout(() => infoDiv.innerHTML = orig, 4000);
            }
            return restored > 0;
        }
        function autoSaveOnChange() {
            document.querySelectorAll('input[type="radio"]').forEach(radio => {
                radio.addEventListener('change', function() {
                    if (!isQuizSubmitted) { saveAnswersToLocal(); updateProgress(); }
                });
            });
        }
        function clearSavedAnswers() {
            localStorage.removeItem(STORAGE_KEY);
            localStorage.removeItem(TIMESTAMP_KEY);
        }

        // ========== RENDER ==========
        function renderQuestions() {
            const container = document.getElementById('questions-container');
            const fragment = document.createDocumentFragment();
            for (let q of questionsData) {
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = `question-${q.id}`;
                const qDiv = document.createElement('div');
                qDiv.className = 'question-text';
                qDiv.innerHTML = `<strong>Câu ${q.id}:</strong> ${q.text}`;
                card.appendChild(qDiv);
                const optsDiv = document.createElement('div');
                optsDiv.className = 'options';
                const letters = ['A','B','C','D'];
                for (let i = 0; i < q.options.length; i++) {
                    const label = document.createElement('label');
                    label.className = 'option';
                    label.dataset.letter = letters[i];
                    const radio = document.createElement('input');
                    radio.type = 'radio';
                    radio.name = `q${q.id}`;
                    radio.value = letters[i];
                    const span = document.createElement('span');
                    span.innerHTML = `<strong>${letters[i]}.</strong> ${q.options[i]}`;
                    label.appendChild(radio);
                    label.appendChild(span);
                    optsDiv.appendChild(label);
                }
                card.appendChild(optsDiv);
                fragment.appendChild(card);
            }
            container.innerHTML = '';
            container.appendChild(fragment);
        }

        function updateProgress() {
            const total = questionsData.length;
            let answered = 0;
            for (let q of questionsData) {
                if (document.querySelector(`input[name="q${q.id}"]:checked`)) answered++;
            }
            const percent = Math.round((answered/total)*100);
            const bar = document.getElementById('progressBar');
            bar.style.width = percent + '%';
            bar.textContent = percent + '%';
        }

        function getUnanswered() {
            const un = [];
            for (let q of questionsData) if (!document.querySelector(`input[name="q${q.id}"]:checked`)) un.push(q.id);
            return un;
        }
        function scrollToUnanswered() {
            const un = getUnanswered();
            if (un.length === 0) { alert('🎉 Bạn đã trả lời tất cả!'); return; }
            const el = document.getElementById(`question-${un[0]}`);
            if (el) {
                el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                el.style.transition = '0.3s';
                el.style.backgroundColor = 'rgba(255,193,7,0.2)';
                setTimeout(() => el.style.backgroundColor = '', 1500);
            }
        }

        // ========== CHẤM BÀI ==========
        function gradeQuiz() {
            if (isQuizSubmitted) return;
            const unanswered = getUnanswered();
            if (unanswered.length > 0 && !confirm(`Bạn còn ${unanswered.length} câu chưa trả lời. Nộp bài?`)) return;
            stopTimer();
            isQuizSubmitted = true;
            let correct = 0, wrongIds = [];
            document.querySelectorAll('input[type="radio"]').forEach(r => r.disabled = true);
            for (let q of questionsData) {
                const selected = document.querySelector(`input[name="q${q.id}"]:checked`);
                const card = document.getElementById(`question-${q.id}`);
                const opts = card.querySelectorAll('.option');
                opts.forEach(opt => { if (opt.dataset.letter === q.correct) opt.classList.add('correct-answer'); });
                if (selected && selected.value === q.correct) {
                    correct++;
                    card.classList.add('correct');
                } else {
                    card.classList.add('wrong');
                    wrongIds.push(q.id);
                    if (selected) {
                        const wrongOpt = card.querySelector(`.option[data-letter="${selected.value}"]`);
                        if (wrongOpt) wrongOpt.classList.add('wrong-answer');
                    }
                }
            }
            const total = questionsData.length;
            const percent = Math.round(correct/total*100);
            const elapsed = getElapsedTime();
            const resultDiv = document.getElementById('result');
            resultDiv.style.display = 'block';
            resultDiv.innerHTML = `
                <div>📊 KẾT QUẢ BÀI LÀM</div>
                <div style="margin:15px 0;">Điểm số: <span>${correct}</span> / ${total} câu</div>
                <div class="result-details">
                    <div class="stat-box"><div class="label">Đúng</div><div class="value" style="color:var(--correct-color);">${correct}</div></div>
                    <div class="stat-box"><div class="label">Sai</div><div class="value" style="color:var(--wrong-color);">${total-correct}</div></div>
                    <div class="stat-box"><div class="label">Tỷ lệ</div><div class="value">${percent}%</div></div>
                    <div class="stat-box"><div class="label">Thời gian</div><div class="value">${elapsed}</div></div>
                </div>
            `;
            // Confetti
            if (correct === total) {
                canvasConfetti({ particleCount: 500, spread: 120, origin: { y: 0.5 } });
                setTimeout(() => canvasConfetti({ particleCount: 300, spread: 100, origin: { y: 0.6 } }), 200);
            } else if (percent >= 80) {
                canvasConfetti({ particleCount: 200, spread: 100, origin: { y: 0.6 } });
            }
            document.getElementById('reviewSection').style.display = 'block';
            localStorage.setItem('lastQuizResult', JSON.stringify({ correctCount: correct, total, percentage: percent, time: elapsed, wrongQuestions: wrongIds, timestamp: new Date().toLocaleString('vi-VN') }));
            resultDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        function scrollToWrong() {
            const wrongs = document.querySelectorAll('.question-card.wrong');
            if (wrongs.length === 0) { alert('🎉 Không có câu sai!'); return; }
            wrongs[0].scrollIntoView({ behavior: 'smooth', block: 'center' });
            wrongs.forEach(c => { c.style.animation = 'none'; setTimeout(() => c.style.animation = 'bounceIn 0.5s', 10); });
        }

        function exportResult() {
            const res = JSON.parse(localStorage.getItem('lastQuizResult') || '{}');
            if (!res.correctCount) { alert('Chưa có kết quả. Hãy nộp bài trước!'); return; }
            let txt = `📝 KẾT QUẢ BÀI TRẮC NGHIỆM\n═══════════════════════════════════\n\n📅 ${res.timestamp}\n⏱️ Thời gian: ${res.time}\n✅ Đúng: ${res.correctCount}/${res.total}\n📊 Tỷ lệ: ${res.percentage}%\n\n`;
            if (res.wrongQuestions?.length) {
                txt += '❌ Các câu sai:\n';
                res.wrongQuestions.forEach(id => {
                    const q = questionsData.find(x => x.id === id);
                    if (q) txt += `   • Câu ${id}: ${q.text.substring(0,50)}...\n`;
                });
            } else txt += '🎉 Hoàn hảo! Không có câu sai.\n';
            txt += '\n═══════════════════════════════════\n🎯 ĐẬU NV1 CÙNG ANH TIẾN ĐẠT';
            const blob = new Blob([txt], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `ket_qua_${Date.now()}.txt`;
            a.click();
            URL.revokeObjectURL(url);
        }

        function resetQuiz() {
            if (!confirm('Xóa tất cả câu trả lời và làm lại?')) return;
            document.querySelectorAll('input[type="radio"]').forEach(r => { r.checked = false; r.disabled = false; });
            document.querySelectorAll('.question-card').forEach(c => c.classList.remove('correct','wrong'));
            document.querySelectorAll('.option').forEach(o => o.classList.remove('correct-answer','wrong-answer'));
            document.getElementById('result').style.display = 'none';
            document.getElementById('reviewSection').style.display = 'none';
            clearSavedAnswers();
            isQuizSubmitted = false;
            updateProgress();
            stopTimer();
            startTimer();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // ========== MỞ KHÓA ==========
        document.getElementById('unlockBtn').addEventListener('click', () => {
            const pwd = document.getElementById('passwordInput').value;
            if (pwd === CORRECT_PASSWORD) {
                document.getElementById('passwordScreen').style.display = 'none';
                document.getElementById('quizContainer').style.display = 'block';
                renderQuestions();
                updateProgress();
                autoSaveOnChange();
                restoreAnswersFromLocal();
                updateProgress();
                startTimer();
            } else {
                const err = document.getElementById('errorMsg');
                err.style.display = 'block';
                setTimeout(() => err.style.display = 'none', 2000);
            }
        });
        document.getElementById('passwordInput').addEventListener('keypress', e => { if (e.key === 'Enter') document.getElementById('unlockBtn').click(); });

        // ========== GẮN SỰ KIỆN ==========
        document.getElementById('submitBtn')?.addEventListener('click', gradeQuiz);
        document.getElementById('resetBtn')?.addEventListener('click', resetQuiz);
        document.getElementById('showWrongBtn')?.addEventListener('click', scrollToWrong);
        document.getElementById('exportBtn')?.addEventListener('click', exportResult);
        document.getElementById('incompleteBtn')?.addEventListener('click', scrollToUnanswered);
    })();
</script>
</body>
</html>
