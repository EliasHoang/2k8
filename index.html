<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Trắc nghiệm Cấp số cộng - Cấp số nhân</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-gradient-start: #0b3b5f;
  --bg-gradient-end: #1b4f72;
  --primary-color: #0b3b5f;
  --secondary-color: #2c9c8c;
  --text-color: #0b3b5f;
  --bg-card: #ffffff;
  --bg-option: #f8fafc;
  --bg-option-hover: #d9eef5;
  --bg-info: #eef2f7;
  --border-color: #cbd5e1;
  --correct-color: #10b981;
  --wrong-color: #ef4444;
  --flag-color: #f59e0b;
  --shadow-sm: 0 4px 12px rgba(0,0,0,0.05);
  --shadow-lg: 0 25px 50px -12px rgba(0,0,0,0.25);
}
[data-theme="dark"] {
  --bg-gradient-start: #0f172a;
  --bg-gradient-end: #1e293b;
  --primary-color: #3b82f6;
  --secondary-color: #14b8a6;
  --text-color: #e2e8f0;
  --bg-card: #1e293b;
  --bg-option: #334155;
  --bg-option-hover: #475569;
  --bg-info: #334155;
  --border-color: #475569;
  --flag-color: #fbbf24;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Be Vietnam Pro', 'Segoe UI', sans-serif; margin: 0; min-height: 100vh; overflow-x: hidden; }

/* Portal login */
#login-screen { position: fixed; inset: 0; display: flex; justify-content: center; align-items: center; background: radial-gradient(circle at center, #0f172a, #020617); z-index: 999; transition: opacity 0.8s ease, transform 0.8s ease; }
#login-screen.exit { opacity: 0; transform: scale(1.06); pointer-events: none; }
.portal { position: absolute; width: 1200px; height: 1200px; background: conic-gradient(#6366f1, #8b5cf6, #ec4899, #3b82f6, #6366f1); border-radius: 50%; filter: blur(110px); animation: portalSpin 18s linear infinite; opacity: 0.55; }
@keyframes portalSpin { to { transform: rotate(360deg); } }
.portal-light { position: fixed; width: 280px; height: 280px; background: radial-gradient(circle, rgba(255,255,255,0.18), transparent 70%); pointer-events: none; transform: translate(-50%, -50%); transition: left 0.1s, top 0.1s; z-index: 1000; }
.login-card { position: relative; z-index: 10; width: 360px; padding: 44px 40px; border-radius: 28px; backdrop-filter: blur(36px); background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12); box-shadow: 0 30px 80px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.1); color: white; animation: cardAppear 1s cubic-bezier(0.16, 1, 0.3, 1) both; }
@keyframes cardAppear { from { opacity: 0; transform: scale(0.82) translateY(40px); filter: blur(12px); } to { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); } }
.login-icon { width: 56px; height: 56px; margin: 0 auto 20px; background: linear-gradient(135deg, #6366f1, #ec4899); border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 24px; box-shadow: 0 8px 24px rgba(99,102,241,0.5); }
.login-title { text-align: center; font-size: 22px; font-weight: 600; margin-bottom: 6px; }
.login-subtitle { text-align: center; font-size: 13px; color: rgba(255,255,255,0.5); margin-bottom: 32px; }
.field { position: relative; margin-bottom: 16px; }
.field input { width: 100%; padding: 14px 16px; border-radius: 14px; border: 1px solid rgba(255,255,255,0.1); outline: none; background: rgba(255,255,255,0.06); color: white; font-size: 15px; }
.field input:focus { border-color: rgba(139,92,246,0.7); box-shadow: 0 0 0 3px rgba(99,102,241,0.2); }
.field label { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); font-size: 14px; color: rgba(255,255,255,0.35); pointer-events: none; transition: 0.25s; }
.field input:focus ~ label, .field input:not(:placeholder-shown) ~ label { top: -8px; font-size: 11px; color: rgba(139,92,246,0.9); }
.login-btn { width: 100%; padding: 15px; border-radius: 14px; border: none; background: linear-gradient(135deg, #6366f1, #8b5cf6, #ec4899); color: white; font-weight: 600; cursor: pointer; margin-top: 8px; transition: 0.2s; }
.login-btn:hover { transform: translateY(-1px); box-shadow: 0 12px 32px rgba(99,102,241,0.5); }
.login-error { margin-top: 12px; text-align: center; font-size: 13px; color: #f87171; min-height: 20px; animation: shake 0.4s ease; }
@keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-6px); } 75% { transform: translateX(6px); } }
.btn-ripple { position: absolute; border-radius: 50%; background: rgba(255,255,255,0.4); transform: scale(0); animation: ripple 0.6s linear; pointer-events: none; }
@keyframes ripple { to { transform: scale(4); opacity: 0; } }

/* Quiz app */
#quiz-app { display: none; min-height: 100vh; background: linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end)); padding: 20px; }
#quiz-app.visible { display: block; animation: quizFadeIn 0.7s; }
@keyframes quizFadeIn { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
.quiz-wrapper { max-width: 900px; margin: 0 auto; background: var(--bg-card); border-radius: 28px; box-shadow: var(--shadow-lg); padding: 30px 32px; }
.quiz-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid var(--border-color); }
.quiz-title { font-size: 22px; font-weight: 700; color: var(--text-color); }
.quiz-meta { background: var(--bg-info); padding: 6px 14px; border-radius: 30px; font-weight: 500; color: var(--secondary-color); }
.progress-bar { margin-bottom: 25px; }
.progress-label { display: flex; justify-content: space-between; font-size: 13px; color: var(--text-color); margin-bottom: 6px; }
.progress-track { height: 6px; background: var(--border-color); border-radius: 99px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--primary-color), var(--secondary-color)); width: 0%; transition: width 0.3s; }
.nav-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 25px; justify-content: center; max-height: 120px; overflow-y: auto; padding: 8px; background: var(--bg-info); border-radius: 20px; }
.nav-btn { width: 44px; height: 44px; border-radius: 12px; border: none; background: var(--bg-option); color: var(--text-color); font-weight: 600; font-size: 16px; cursor: pointer; transition: all 0.2s; position: relative; }
.nav-btn:hover { background: var(--secondary-color); color: white; transform: scale(1.05); }
.nav-btn.active { background: var(--primary-color); color: white; }
.nav-btn.answered { background: var(--correct-color); color: white; }
.nav-btn.flagged { background: var(--flag-color); color: #1e293b; }
.nav-btn.flagged::after { content: "🏁"; position: absolute; top: -6px; right: -6px; font-size: 12px; background: white; border-radius: 20px; padding: 0 4px; }
.question-card { background: var(--bg-info); border-radius: 20px; padding: 24px; margin-bottom: 20px; }
.question-number { font-size: 13px; font-weight: 600; color: var(--secondary-color); margin-bottom: 10px; }
.question-text { font-size: 18px; font-weight: 600; color: var(--text-color); margin-bottom: 20px; line-height: 1.5; }
.options { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
.option { display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: var(--bg-option); border: 2px solid var(--border-color); border-radius: 14px; cursor: pointer; transition: all 0.2s; color: var(--text-color); }
.option:hover { background: var(--bg-option-hover); transform: translateX(4px); }
.option input { accent-color: var(--secondary-color); cursor: pointer; }
.flag-button { margin-top: 16px; padding: 8px 16px; background: rgba(245, 158, 11, 0.15); border: 1px solid var(--flag-color); border-radius: 40px; font-size: 13px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; color: var(--flag-color); }
.flag-button:hover { background: rgba(245, 158, 11, 0.3); }
.answer-result { margin-top: 16px; padding: 14px 18px; border-radius: 14px; font-size: 14px; display: none; }
.answer-result.correct { background: rgba(16, 185, 129, 0.1); border-left: 4px solid var(--correct-color); color: var(--correct-color); display: block; }
.answer-result.wrong { background: rgba(239, 68, 68, 0.1); border-left: 4px solid var(--wrong-color); color: var(--wrong-color); display: block; }
.navigation-buttons { display: flex; justify-content: space-between; margin-top: 15px; flex-wrap: wrap; gap: 15px; }
.nav-control { display: flex; gap: 15px; }
.action-buttons { display: flex; justify-content: center; gap: 20px; margin: 30px 0 20px; }
.btn { padding: 12px 24px; border-radius: 40px; border: none; font-weight: 700; font-size: 15px; cursor: pointer; transition: 0.2s; }
.btn-primary { background: linear-gradient(135deg, var(--primary-color), var(--secondary-color)); color: white; }
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 18px rgba(0,0,0,0.2); }
.btn-secondary { background: #6c757d; color: white; }
.result-summary { background: var(--bg-info); border-radius: 20px; padding: 20px; margin-top: 25px; text-align: center; display: none; }
.result-stats { display: flex; justify-content: center; gap: 30px; margin: 20px 0; flex-wrap: wrap; }
.stat { text-align: center; }
.stat-value { font-size: 32px; font-weight: 700; color: var(--secondary-color); }
.theme-toggle { position: fixed; top: 20px; right: 20px; width: 44px; height: 44px; border-radius: 50%; background: rgba(255,255,255,0.12); backdrop-filter: blur(12px); color: white; font-size: 20px; cursor: pointer; z-index: 100; display: none; align-items: center; justify-content: center; }
.theme-toggle.show { display: flex; }
footer { text-align: center; margin-top: 30px; font-size: 13px; color: var(--text-color); opacity: 0.6; border-top: 1px solid var(--border-color); padding-top: 18px; }
@media (max-width: 600px) { .quiz-wrapper { padding: 18px; } .nav-btn { width: 36px; height: 36px; font-size: 14px; } }
</style>
</head>
<body>
<div id="login-screen">
  <div class="portal"></div>
  <div class="portal-light" id="portalLight"></div>
  <div class="login-card">
    <div class="login-icon">📐</div>
    <div class="login-title">Trắc Nghiệm Toán</div>
    <div class="login-subtitle">Cấp số cộng · Cấp số nhân</div>
    <div class="field">
      <input type="password" id="passwordInput" placeholder=" " autocomplete="current-password">
      <label>Nhập mật khẩu</label>
    </div>
    <button class="login-btn" id="loginBtn">Bắt đầu thi →</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>
<button class="theme-toggle" id="themeToggle">🌙</button>
<div id="quiz-app">
  <div class="quiz-wrapper">
    <div class="quiz-header">
      <div class="quiz-title">📘 Cấp số cộng · Cấp số nhân</div>
      <div class="quiz-meta">40 câu</div>
    </div>
    <div class="progress-bar">
      <div class="progress-label"><span>Tiến độ làm bài</span><span id="answeredPercent">0%</span></div>
      <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    </div>
    <div id="navGrid" class="nav-grid"></div>
    <div id="currentQuestion"></div>
    <div class="navigation-buttons">
      <div class="nav-control">
        <button class="btn btn-secondary" id="prevBtn">◀ Câu trước</button>
        <button class="btn btn-secondary" id="nextBtn">Câu tiếp theo ▶</button>
      </div>
    </div>
    <div class="action-buttons">
      <button class="btn btn-primary" id="submitBtn">📝 NỘP BÀI</button>
      <button class="btn btn-secondary" id="resetBtn">🔄 LÀM LẠI</button>
    </div>
    <div id="resultSummary" class="result-summary"></div>
    <footer>🎯 ĐẬU NV1 CÙNG ANH TIẾN ĐẠT</footer>
  </div>
</div>
<script>
// 40 câu hỏi (rút gọn nhưng đầy đủ nội dung)
const questions = [
  { text: "Cho cấp số cộng 2;5;8;11;14... Công sai của cấp số cộng đã cho bằng", options: ["A. -3", "B. 3", "C. 2", "D. 14"], correct: 1, explanation: "Công sai d = 5 - 2 = 3." },
  { text: "Trong các dãy số sau, dãy số nào không là cấp số cộng?", options: ["A. 2;0;-2;-4;-5", "B. 1/2; -1/2; -3/2; -5/2; -7/2", "C. √2; √2; √2; √2; √2", "D. -7;-4;-1;2;5"], correct: 0, explanation: "Dãy A có công sai không đều." },
  { text: "Công thức tính số hạng tổng quát của cấp số cộng với công sai d và số hạng đầu u₁ là", options: ["A. uₙ = n.u₁ + n(n-1)d", "B. uₙ = u₁ + (n-1)d", "C. uₙ = u₁ + n(n-1)d/2", "D. uₙ = n.u₁ + n(n-1)d/2"], correct: 1, explanation: "Công thức đúng: uₙ = u₁ + (n-1)d." },
  { text: "Cho cấp số cộng (uₙ) với u₁ = 9 và công sai d = 2. Giá trị của u₂ bằng", options: ["A. 11", "B. 9/2", "C. 18", "D. 7"], correct: 0, explanation: "u₂ = 9+2=11." },
  { text: "Cho cấp số cộng (uₙ) với u₁ = 5; u₂ = 10. Công sai của cấp số cộng đã cho bằng", options: ["A. -5", "B. 5", "C. 2", "D. 15"], correct: 1, explanation: "d = 10-5=5." },
  { text: "Cho cấp số cộng (uₙ) với u₁ = 2 và u₇ = -10. Công sai của cấp số cộng đã cho bằng", options: ["A. 2", "B. 3", "C. -1", "D. -2"], correct: 3, explanation: "u₇ = u₁+6d ⇒ d=-2." },
  { text: "Cho cấp số cộng (uₙ) với u₁ = 1 và u₄ = -26. Công sai của (uₙ) bằng", options: ["A. -27", "B. -9", "C. -26", "D. ∛(-26)"], correct: 1, explanation: "u₄ = u₁+3d ⇒ d=-9." },
  { text: "Cho cấp số cộng (uₙ) với u₁ = 4 và d = 8. Số hạng u₂₀ của cấp số cộng đã cho bằng", options: ["A. 156", "B. 165", "C. 12", "D. 245"], correct: 0, explanation: "u₂₀ = 4+19·8=156." },
  { text: "Cho cấp số cộng (uₙ), với u₁ = 2, u₅ = 14. Công sai của cấp số cộng là", options: ["A. 3", "B. -3", "C. 4", "D. -4"], correct: 0, explanation: "u₅ = u₁+4d ⇒ d=3." },
  { text: "Cho cấp số cộng (uₙ), biết u₃ = -2; u₇ = 18. Số hạng u₁₁ bằng", options: ["A. 38", "B. 20", "C. 43", "D. 33"], correct: 0, explanation: "d=5, u₁₁=38." },
  { text: "Cho cấp số cộng (uₙ) với u₁ = 3 và d = -3. Tổng 10 số hạng đầu tiên bằng", options: ["A. 26", "B. -26", "C. -105", "D. 105"], correct: 2, explanation: "S₁₀ = -105." },
  { text: "Cho cấp số cộng (uₙ) có u₁ = 1 và công sai d = 2. Tổng S₁₀ = u₁+...+u₁₀ bằng", options: ["A. 110", "B. 100", "C. 21", "D. 19"], correct: 1, explanation: "S₁₀ = 100." },
  { text: "Cho cấp số cộng (uₙ) có số hạng đầu u₁ = 3 và công sai d = 2. Tổng của 2019 số hạng đầu bằng", options: ["A. 4 080 399", "B. 4 800 399", "C. 4 399 080", "D. 8 154 741"], correct: 0, explanation: "S₂₀₁₉ = 4 080 399." },
  { text: "Một cấp số cộng có số hạng đầu u₁ = 1/3, công sai d = -1. Tổng n số hạng đầu bằng -425. Giá trị của n bằng", options: ["A. 30", "B. 60", "C. 45", "D. 15"], correct: 0, explanation: "n=30." },
  { text: "Cho dãy số (uₙ) với uₙ = 2n + 1, số hạng thứ 2019 của dãy là", options: ["A. 4039", "B. 4390", "C. 4930", "D. 4093"], correct: 0, explanation: "4039." },
  { text: "Cho cấp số cộng (uₙ) với u₁ = 2; d = 9. Khi đó số 2018 là số hạng thứ mấy?", options: ["A. 226", "B. 225", "C. 223", "D. 224"], correct: 1, explanation: "n=225." },
  { text: "Cho (uₙ) là cấp số cộng có u₄ + u₁₆ = 48. Số hạng u₁₀ bằng", options: ["A. 438", "B. 24", "C. 96", "D. 72"], correct: 1, explanation: "u₁₀ = 24." },
  { text: "Cho cấp số cộng (uₙ) biết u₅ + u₇ = 19. Giá trị của u₂ + u₁₀ là", options: ["A. 38", "B. 29", "C. 12", "D. 19"], correct: 3, explanation: "u₂+u₁₀=19." },
  { text: "Cho (uₙ) là cấp số cộng có u₉ = 5u₂ và u₁₃ = 2u₆ + 5. Số hạng đầu u₁ và công sai d là", options: ["A. u₁=-3,d=4", "B. u₁=3,d=4", "C. u₁=4,d=3", "D. u₁=-4,d=3"], correct: 1, explanation: "u₁=3,d=4." },
  { text: "Trong các dãy số (uₙ) với số hạng tổng quát sau, dãy số nào là cấp số cộng?", options: ["A. uₙ=5ⁿ", "B. uₙ=2-5n", "C. uₙ=5ⁿ-2", "D. uₙ=5+n²"], correct: 1, explanation: "uₙ=2-5n là CSC." },
  { text: "Trong các dãy số (uₙ) với số hạng tổng quát sau, dãy số nào là cấp số cộng?", options: ["A. uₙ=3·2ⁿ", "B. uₙ=3-2n", "C. uₙ=2ⁿ+3", "D. uₙ=2+n³"], correct: 1, explanation: "uₙ=3-2n là CSC." },
  { text: "Cho cấp số cộng (uₙ) có u₁₀ = 30 và u₂₀ = 80. Công sai d bằng", options: ["A. 5", "B. 10", "C. 50", "D. 110"], correct: 0, explanation: "d=5." },
  { text: "Cho cấp số cộng (uₙ) có u₁ = 5 và tổng của 50 số hạng đầu bằng 5150. Tìm công thức số hạng tổng quát uₙ.", options: ["A. uₙ=1+4n", "B. uₙ=5n", "C. uₙ=3+2n", "D. uₙ=2+3n"], correct: 0, explanation: "uₙ=4n+1." },
  { text: "Ba số x, y, z theo thứ tự lập thành cấp số cộng. Biết x+y+z=15 và xyz=80. Giá trị y bằng", options: ["A. 4", "B. 5", "C. 6", "D. 8"], correct: 1, explanation: "y=5." },
  { text: "Cho cấp số nhân (uₙ) với u₁=3 và q=2. Giá trị của u₂ bằng", options: ["A. 8", "B. 9", "C. 6", "D. 3/2"], correct: 2, explanation: "u₂=6." },
  { text: "Cho cấp số nhân (uₙ) với u₁=2 và u₂=6. Công bội q bằng", options: ["A. 3", "B. -4", "C. 4", "D. 1/3"], correct: 0, explanation: "q=3." },
  { text: "Cho cấp số nhân (uₙ) với u₁=3; u₂=1. Công bội q bằng", options: ["A. 1/3", "B. -2", "C. 3", "D. 2"], correct: 0, explanation: "q=1/3." },
  { text: "Dãy số nào sau đây không phải là cấp số nhân?", options: ["A. 1;-3;9;-27;54", "B. 1;2;4;8;16", "C. 1;-1;1;-1;1", "D. 1;-2;4;-8;16"], correct: 0, explanation: "Dãy A không đều công bội." },
  { text: "Cho cấp số nhân (uₙ) có u₁=5, q=-1. u₆ bằng", options: ["A. 5", "B. -5", "C. 10", "D. -10"], correct: 1, explanation: "u₆=-5." },
  { text: "Cho cấp số nhân (uₙ) có u₂=6, u₅=162 (q>0). q bằng", options: ["A. 2", "B. 3", "C. 4", "D. 6"], correct: 1, explanation: "q=3." },
  { text: "Cho cấp số nhân (uₙ) có u₃=12, u₆=96. Tổng S₆ bằng", options: ["A. 189", "B. 378", "C. 126", "D. 252"], correct: 0, explanation: "S₆=189." },
  { text: "Cho cấp số nhân u₁=3, q=-2. u₅ bằng", options: ["A. -6", "B. -5", "C. 48", "D. -24"], correct: 2, explanation: "u₅=48." },
  { text: "Cho cấp số nhân u₁=2, q=3. u₂₀₁₉ bằng", options: ["A. 2·3²⁰¹⁸", "B. 3·2²⁰¹⁸", "C. 2·3²⁰¹⁹", "D. 3·2²⁰¹⁹"], correct: 0, explanation: "2·3²⁰¹⁸." },
  { text: "Cấp số nhân u₁=3, q=2, Sₙ=21, tìm n", options: ["A. 10", "B. 3", "C. 7", "D. Không"], correct: 1, explanation: "n=3." },
  { text: "Cấp số nhân uₙ=3ⁿ, công bội q bằng", options: ["A. -3", "B. 1/3", "C. ±3", "D. 3"], correct: 3, explanation: "q=3." },
  { text: "Cấp số nhân u₁=2, u₆=486, q bằng", options: ["A. 3", "B. 5", "C. 3/2", "D. 2/3"], correct: 0, explanation: "q=3." },
  { text: "CSN q>1, u₂=-3, u₁+u₂+u₃=-13. Tìm u₁,q", options: ["A. u₁=1,q=3", "B. u₁=-1,q=-3", "C. u₁=-1,q=3", "D. u₁=1,q=-3"], correct: 2, explanation: "u₁=-1,q=3." },
  { text: "CSN u₄-u₂=54, u₅-u₃=108. Tìm u₁,q", options: ["A. u₁=9,q=2", "B. u₁=9,q=-2", "C. u₁=-9,q=-2", "D. u₁=-9,q=2"], correct: 0, explanation: "u₁=9,q=2." },
  { text: "CSN u₄+u₆=-540, u₃+u₅=180. Tính S₂₁", options: ["A. ½(3²¹+1)", "B. 3²¹-1", "C. 1-3²¹", "D. -½(3²¹+1)"], correct: 0, explanation: "S₂₁=(3²¹+1)/2." },
  { text: "Vi khuẩn tăng gấp đôi, sau 5p có 64000. Hỏi sau bao lâu có 2048000?", options: ["A. 10", "B. 11", "C. 26", "D. 50"], correct: 0, explanation: "t=10 phút." }
];

const CORRECT_PASSWORD = "tamduc";
const STORAGE_KEY = "quizProgressFinal";

let userAnswers = new Array(questions.length).fill(null);
let flagged = new Array(questions.length).fill(false);
let submitted = false;
let currentIndex = 0;
let startTime = null;

// Lưu & tải
function saveProgress() {
  const data = { answers: userAnswers, flagged, submitted, currentIndex, startTime, savedAt: Date.now() };
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}
function loadProgress() {
  const raw = localStorage.getItem(STORAGE_KEY);
  if (!raw) return false;
  try {
    const data = JSON.parse(raw);
    if (data.savedAt && (Date.now() - data.savedAt > 7*86400000)) { localStorage.removeItem(STORAGE_KEY); return false; }
    userAnswers = data.answers || new Array(questions.length).fill(null);
    flagged = data.flagged || new Array(questions.length).fill(false);
    submitted = data.submitted || false;
    currentIndex = data.currentIndex || 0;
    startTime = data.startTime || null;
    return true;
  } catch(e) { return false; }
}
function clearProgress() { localStorage.removeItem(STORAGE_KEY); }

// Điều hướng
function renderNavGrid() {
  const nav = document.getElementById('navGrid');
  nav.innerHTML = '';
  for (let i = 0; i < questions.length; i++) {
    const btn = document.createElement('button');
    btn.textContent = (i+1).toString();
    btn.className = 'nav-btn';
    if (userAnswers[i] !== null) btn.classList.add('answered');
    if (flagged[i]) btn.classList.add('flagged');
    if (i === currentIndex) btn.classList.add('active');
    btn.addEventListener('click', () => {
      if (!submitted) { currentIndex = i; renderCurrentQuestion(); updateNavActive(); saveProgress(); }
    });
    nav.appendChild(btn);
  }
}
function updateNavActive() {
  const btns = document.querySelectorAll('.nav-btn');
  btns.forEach((btn, idx) => {
    if (idx === currentIndex) btn.classList.add('active');
    else btn.classList.remove('active');
    if (userAnswers[idx] !== null) btn.classList.add('answered');
    else btn.classList.remove('answered');
    if (flagged[idx]) btn.classList.add('flagged');
    else btn.classList.remove('flagged');
  });
}

// Gắn cờ
function toggleFlag() {
  if (submitted) return;
  flagged[currentIndex] = !flagged[currentIndex];
  updateNavActive();
  const flagBtn = document.getElementById('flagButton');
  if (flagBtn) flagBtn.innerHTML = flagged[currentIndex] ? '🏁 Bỏ cờ' : '🚩 Gắn cờ';
  saveProgress();
}

// Hiển thị câu hiện tại (KHÔNG hiển thị đáp án nếu chưa nộp)
function renderCurrentQuestion() {
  const q = questions[currentIndex];
  const container = document.getElementById('currentQuestion');
  const selectedVal = userAnswers[currentIndex];
  container.innerHTML = `
    <div class="question-card">
      <div class="question-number">Câu ${currentIndex+1}</div>
      <div class="question-text">${q.text}</div>
      <div class="options" id="options-container">
        ${q.options.map((opt, idx) => `
          <label class="option">
            <input type="radio" name="current" value="${idx}" ${selectedVal === idx ? 'checked' : ''} ${submitted ? 'disabled' : ''}>
            <span>${opt}</span>
          </label>
        `).join('')}
      </div>
      ${!submitted ? `<div><button class="flag-button" id="flagButton">${flagged[currentIndex] ? '🏁 Bỏ cờ' : '🚩 Gắn cờ'}</button></div>` : ''}
      <div class="answer-result" id="answer-result-current"></div>
    </div>
  `;
  // Nếu đã nộp bài, hiển thị kết quả cho câu này
  if (submitted) {
    showResultForCurrent();
  } else {
    // Chưa nộp: gắn sự kiện radio và flag
    const flagBtn = document.getElementById('flagButton');
    if (flagBtn) flagBtn.addEventListener('click', toggleFlag);
    const radios = document.querySelectorAll('#options-container input');
    radios.forEach(radio => {
      radio.addEventListener('change', (e) => {
        const newVal = parseInt(e.target.value);
        userAnswers[currentIndex] = newVal;
        updateProgress();
        updateNavActive();
        saveProgress();
      });
    });
  }
}

function showResultForCurrent() {
  const q = questions[currentIndex];
  const userChoice = userAnswers[currentIndex];
  const isCorrect = (userChoice === q.correct);
  const resultDiv = document.getElementById('answer-result-current');
  const correctLetter = String.fromCharCode(65 + q.correct);
  if (userChoice !== null) {
    resultDiv.className = isCorrect ? 'answer-result correct' : 'answer-result wrong';
    resultDiv.innerHTML = isCorrect ? `<strong>✅ Đáp án đúng: ${correctLetter}</strong><div class="explanation">${q.explanation}</div>` : `<strong>❌ Sai. Đáp án đúng: ${correctLetter}</strong><div class="explanation">${q.explanation}</div>`;
  } else {
    resultDiv.className = 'answer-result wrong';
    resultDiv.innerHTML = `<strong>⚠️ Chưa trả lời. Đáp án đúng: ${correctLetter}</strong><div class="explanation">${q.explanation}</div>`;
  }
  resultDiv.style.display = 'block';
}

function updateProgress() {
  const answered = userAnswers.filter(a => a !== null).length;
  const percent = Math.round((answered / questions.length) * 100);
  document.getElementById('answeredPercent').innerText = `${percent}%`;
  document.getElementById('progressFill').style.width = `${percent}%`;
}

function getElapsedTime() {
  if (!startTime) return "00:00";
  const elapsed = Math.floor((Date.now() - startTime) / 1000);
  const mins = Math.floor(elapsed / 60);
  const secs = elapsed % 60;
  return `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
}

// Nộp bài
function submitQuiz() {
  if (submitted) return;
  const unanswered = userAnswers.filter(a => a === null).length;
  if (unanswered > 0 && !confirm(`Bạn còn ${unanswered} câu chưa trả lời. Nộp bài không?`)) return;
  submitted = true;
  const correctCount = userAnswers.reduce((cnt, ans, idx) => cnt + (ans === questions[idx].correct ? 1 : 0), 0);
  const total = questions.length;
  const percent = Math.round((correctCount / total) * 100);
  const timeStr = getElapsedTime();
  // Render lại câu hiện tại để hiển thị kết quả
  renderCurrentQuestion();  // sẽ gọi showResultForCurrent() vì submitted=true
  // Hiển thị bảng tổng kết
  const summaryDiv = document.getElementById('resultSummary');
  summaryDiv.style.display = 'block';
  summaryDiv.innerHTML = `
    <h3>📊 KẾT QUẢ BÀI LÀM</h3>
    <div class="result-stats">
      <div class="stat"><div class="stat-value" style="color:var(--correct-color)">${correctCount}</div><div class="stat-label">Đúng</div></div>
      <div class="stat"><div class="stat-value" style="color:var(--wrong-color)">${total - correctCount}</div><div class="stat-label">Sai</div></div>
      <div class="stat"><div class="stat-value">${percent}%</div><div class="stat-label">Tỷ lệ</div></div>
      <div class="stat"><div class="stat-value">${timeStr}</div><div class="stat-label">Thời gian</div></div>
    </div>
    <button class="btn btn-secondary" id="retryBtn">🔁 Làm lại từ đầu</button>
  `;
  document.getElementById('retryBtn').addEventListener('click', () => resetQuiz());
  // Disable tất cả radio
  document.querySelectorAll('#options-container input').forEach(r => r.disabled = true);
  if (percent >= 80) canvasConfetti({ particleCount: 200, spread: 100, origin: { y: 0.6 } });
  if (correctCount === total) canvasConfetti({ particleCount: 500, spread: 120, origin: { y: 0.5 } });
  updateNavActive();
  saveProgress();
}

// Reset
function resetQuiz() {
  if (!confirm("Xóa toàn bộ tiến độ và làm lại từ đầu?")) return;
  userAnswers.fill(null);
  flagged.fill(false);
  submitted = false;
  currentIndex = 0;
  startTime = Date.now();
  renderNavGrid();
  renderCurrentQuestion();
  document.getElementById('resultSummary').style.display = 'none';
  updateProgress();
  clearProgress();
  saveProgress();
}

function nextQuestion() {
  if (currentIndex < questions.length - 1) {
    currentIndex++;
    renderCurrentQuestion();
    updateNavActive();
    saveProgress();
  }
}
function prevQuestion() {
  if (currentIndex > 0) {
    currentIndex--;
    renderCurrentQuestion();
    updateNavActive();
    saveProgress();
  }
}

// Khởi tạo sau đăng nhập
function initQuiz() {
  const restored = loadProgress();
  if (!restored) {
    userAnswers.fill(null);
    flagged.fill(false);
    submitted = false;
    currentIndex = 0;
    startTime = Date.now();
  }
  renderNavGrid();
  renderCurrentQuestion();
  updateProgress();
  // Nếu đã nộp bài từ trước, hiển thị lại kết quả tổng kết
  if (submitted) {
    const correctCount = userAnswers.reduce((cnt, ans, idx) => cnt + (ans === questions[idx].correct ? 1 : 0), 0);
    const total = questions.length;
    const percent = Math.round((correctCount / total) * 100);
    const timeStr = getElapsedTime();
    const summaryDiv = document.getElementById('resultSummary');
    summaryDiv.style.display = 'block';
    summaryDiv.innerHTML = `
      <h3>📊 KẾT QUẢ BÀI LÀM</h3>
      <div class="result-stats">
        <div class="stat"><div class="stat-value" style="color:var(--correct-color)">${correctCount}</div><div class="stat-label">Đúng</div></div>
        <div class="stat"><div class="stat-value" style="color:var(--wrong-color)">${total - correctCount}</div><div class="stat-label">Sai</div></div>
        <div class="stat"><div class="stat-value">${percent}%</div><div class="stat-label">Tỷ lệ</div></div>
        <div class="stat"><div class="stat-value">${timeStr}</div><div class="stat-label">Thời gian</div></div>
      </div>
      <button class="btn btn-secondary" id="retryBtn">🔁 Làm lại từ đầu</button>
    `;
    document.getElementById('retryBtn').addEventListener('click', () => resetQuiz());
  }
}

// Portal login
document.addEventListener("mousemove", e => {
  const light = document.getElementById("portalLight");
  light.style.left = e.clientX + "px";
  light.style.top = e.clientY + "px";
});
function addRipple(btn, e) {
  const rect = btn.getBoundingClientRect();
  const span = document.createElement("span");
  span.className = "btn-ripple";
  span.style.width = span.style.height = "60px";
  span.style.left = (e.clientX - rect.left - 30) + "px";
  span.style.top = (e.clientY - rect.top - 30) + "px";
  btn.appendChild(span);
  setTimeout(() => span.remove(), 650);
}
function checkPassword() {
  const val = document.getElementById("passwordInput").value.trim();
  const err = document.getElementById("loginError");
  if (!val) { showError("Vui lòng nhập mật khẩu!"); return; }
  if (val === CORRECT_PASSWORD) {
    err.textContent = "";
    const loginScreen = document.getElementById("login-screen");
    loginScreen.classList.add("exit");
    setTimeout(() => {
      loginScreen.style.display = "none";
      document.getElementById("themeToggle").classList.add("show");
      document.getElementById("quiz-app").classList.add("visible");
      initQuiz();
    }, 780);
  } else {
    showError("Mật khẩu không đúng. Thử lại nhé!");
    document.getElementById("passwordInput").value = "";
    document.getElementById("passwordInput").focus();
  }
}
function showError(msg) {
  const el = document.getElementById("loginError");
  el.textContent = msg;
  el.style.animation = "none";
  void el.offsetWidth;
  el.style.animation = "shake 0.4s ease";
}
document.getElementById("loginBtn").addEventListener("click", (e) => { addRipple(e.target, e); checkPassword(); });
document.getElementById("passwordInput").addEventListener("keydown", (e) => { if (e.key === "Enter") checkPassword(); });
document.getElementById("nextBtn").addEventListener("click", nextQuestion);
document.getElementById("prevBtn").addEventListener("click", prevQuestion);
document.getElementById("submitBtn").addEventListener("click", submitQuiz);
document.getElementById("resetBtn").addEventListener("click", resetQuiz);
const themeToggle = document.getElementById("themeToggle");
themeToggle.addEventListener("click", () => {
  const isDark = document.documentElement.getAttribute("data-theme") === "dark";
  document.documentElement.setAttribute("data-theme", isDark ? "" : "dark");
  themeToggle.textContent = isDark ? "🌙" : "☀️";
});
if (typeof canvasConfetti === 'undefined') {
  const script = document.createElement('script');
  script.src = "https://cdn.jsdelivr.net/npm/canvas-confetti@1";
  document.head.appendChild(script);
}
</script>
