<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Trắc nghiệm Toán - 14 Chuyên đề</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* (giữ nguyên toàn bộ style như phiên bản trước) */
:root {
  --bg-gradient-start: #0b3b5f;
  --bg-gradient-end: #1b4f72;
  --primary-color: #0b3b5f;
  --secondary-color: #2c9c8c;
  --text-color: #0b3b5f;
  --bg-card: #ffffff;
  --bg-option: #f8fafc;
  --bg-option-hover: #d9eef5;
  --bg-info: #eef2f7;
  --border-color: #cbd5e1;
  --correct-color: #10b981;
  --wrong-color: #ef4444;
  --shadow-sm: 0 4px 12px rgba(0,0,0,0.05);
  --shadow-lg: 0 25px 50px -12px rgba(0,0,0,0.25);
}
[data-theme="dark"] {
  --bg-gradient-start: #0f172a;
  --bg-gradient-end: #1e293b;
  --primary-color: #3b82f6;
  --secondary-color: #14b8a6;
  --text-color: #e2e8f0;
  --bg-card: #1e293b;
  --bg-option: #334155;
  --bg-option-hover: #475569;
  --bg-info: #334155;
  --border-color: #475569;
  --shadow-sm: 0 4px 12px rgba(0,0,0,0.3);
  --shadow-lg: 0 25px 50px -12px rgba(0,0,0,0.5);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Be Vietnam Pro', 'Segoe UI', sans-serif;
  margin: 0;
  min-height: 100vh;
  background: linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
  overflow-x: hidden;
  transition: background 0.3s;
}
#login-screen {
  position: fixed;
  inset: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  background: radial-gradient(circle at center, #0f172a, #020617);
  z-index: 999;
  transition: opacity 0.8s ease, transform 0.8s ease;
}
#login-screen.exit { opacity: 0; transform: scale(1.06); pointer-events: none; }
.portal {
  position: absolute;
  width: 1200px;
  height: 1200px;
  background: conic-gradient(#6366f1, #8b5cf6, #ec4899, #3b82f6, #6366f1);
  border-radius: 50%;
  filter: blur(110px);
  animation: portalSpin 18s linear infinite;
  opacity: 0.55;
}
@keyframes portalSpin { to { transform: rotate(360deg); } }
.portal-light {
  position: fixed;
  width: 280px;
  height: 280px;
  background: radial-gradient(circle, rgba(255,255,255,0.18), transparent 70%);
  pointer-events: none;
  transform: translate(-50%, -50%);
  transition: left 0.1s, top 0.1s;
  z-index: 1000;
}
.login-card {
  position: relative;
  z-index: 10;
  width: 360px;
  padding: 44px 40px;
  border-radius: 28px;
  backdrop-filter: blur(36px);
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.12);
  box-shadow: 0 30px 80px rgba(0,0,0,0.6);
  color: white;
  animation: cardAppear 1s cubic-bezier(0.16, 1, 0.3, 1) both;
}
@keyframes cardAppear {
  from { opacity: 0; transform: scale(0.82) translateY(40px); filter: blur(12px); }
  to   { opacity: 1; transform: scale(1) translateY(0);       filter: blur(0); }
}
.login-icon {
  width: 56px;
  height: 56px;
  margin: 0 auto 20px;
  background: linear-gradient(135deg, #6366f1, #ec4899);
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  font-weight: bold;
}
.login-title { text-align: center; font-size: 22px; font-weight: 600; margin-bottom: 6px; }
.login-subtitle { text-align: center; font-size: 13px; color: rgba(255,255,255,0.5); margin-bottom: 32px; }
.field { position: relative; margin-bottom: 16px; }
.field input {
  width: 100%;
  padding: 14px 16px;
  border-radius: 14px;
  border: 1px solid rgba(255,255,255,0.1);
  outline: none;
  background: rgba(255,255,255,0.06);
  color: white;
  font-size: 15px;
  font-family: inherit;
}
.field input:focus { border-color: rgba(139,92,246,0.7); box-shadow: 0 0 0 3px rgba(99,102,241,0.2); }
.field label {
  position: absolute;
  left: 16px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 14px;
  color: rgba(255,255,255,0.35);
  pointer-events: none;
  transition: 0.25s ease;
}
.field input:focus ~ label, .field input:not(:placeholder-shown) ~ label {
  top: -8px;
  font-size: 11px;
  color: rgba(139,92,246,0.9);
}
.login-btn {
  width: 100%;
  padding: 15px;
  border-radius: 14px;
  border: none;
  background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #ec4899 100%);
  color: white;
  font-weight: 600;
  font-size: 15px;
  cursor: pointer;
  transition: transform 0.15s;
  margin-top: 8px;
}
.login-btn:hover { transform: translateY(-1px); }
.login-error { margin-top: 12px; text-align: center; font-size: 13px; color: #f87171; min-height: 20px; animation: shake 0.4s ease; display: none; }
@keyframes shake { 0%,100%{ transform: translateX(0); } 25%{ transform: translateX(-6px); } 75%{ transform: translateX(6px); } }
#app-container {
  display: none;
  min-height: 100vh;
  background: linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
  padding: 20px;
}
#app-container.visible { display: block; }
.quiz-wrapper, .admin-wrapper {
  max-width: 1100px;
  margin: 0 auto;
  background: var(--bg-card);
  border-radius: 28px;
  box-shadow: var(--shadow-lg);
  padding: 30px 32px;
}
.topic-selector {
  margin-bottom: 25px;
  padding: 15px;
  background: var(--bg-info);
  border-radius: 20px;
}
.topic-buttons {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-bottom: 15px;
}
.topic-btn {
  padding: 10px 20px;
  border-radius: 40px;
  border: none;
  background: var(--bg-option);
  color: var(--text-color);
  font-weight: 600;
  cursor: pointer;
}
.topic-btn.active {
  background: var(--primary-color);
  color: white;
}
.part-buttons {
  display: flex;
  gap: 15px;
}
.part-btn {
  padding: 8px 20px;
  border-radius: 30px;
  border: none;
  background: var(--bg-option);
  color: var(--text-color);
  font-weight: 500;
  cursor: pointer;
}
.part-btn.active {
  background: var(--secondary-color);
  color: white;
}
.quiz-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
.progress-bar { margin-bottom: 25px; }
.progress-label { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 6px; }
.progress-track { height: 6px; background: var(--border-color); border-radius: 99px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--primary-color), var(--secondary-color)); width: 0%; transition: width 0.3s; }
.nav-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 25px; justify-content: center; max-height: 120px; overflow-y: auto; padding: 8px; background: var(--bg-info); border-radius: 20px; }
.nav-btn {
  position: relative;
  width: 44px;
  height: 44px;
  border-radius: 12px;
  border: none;
  background: var(--bg-option);
  color: var(--text-color);
  font-weight: 600;
  cursor: pointer;
  font-size: 14px;
}
.nav-btn.active { background: var(--primary-color); color: white; }
.nav-btn.answered { background: var(--correct-color); color: white; }
.nav-btn.flagged::after {
  content: "🚩";
  position: absolute;
  top: -5px;
  right: -5px;
  font-size: 14px;
  background: var(--bg-card);
  border-radius: 50%;
  width: 18px;
  height: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.question-card { background: var(--bg-info); border-radius: 20px; padding: 24px; margin-bottom: 20px; }
.question-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.flag-btn {
  background: none;
  border: none;
  font-size: 24px;
  cursor: pointer;
  padding: 5px;
  border-radius: 50%;
  transition: 0.2s;
}
.flag-btn:hover { transform: scale(1.1); background: rgba(0,0,0,0.1); }
.question-text { font-size: 18px; font-weight: 600; margin-bottom: 20px; }
.options { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
.option { display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: var(--bg-option); border: 2px solid var(--border-color); border-radius: 14px; cursor: pointer; }
.option:hover { background: var(--bg-option-hover); }
.option input { accent-color: var(--secondary-color); }
.answer-result { margin-top: 16px; padding: 14px 18px; border-radius: 14px; display: none; }
.answer-result.correct { background: rgba(16,185,129,0.1); border-left: 4px solid var(--correct-color); display: block; }
.answer-result.wrong { background: rgba(239,68,68,0.1); border-left: 4px solid var(--wrong-color); display: block; }
.navigation-buttons { display: flex; justify-content: space-between; margin-top: 15px; }
.action-buttons { display: flex; justify-content: center; gap: 15px; margin: 30px 0 20px; flex-wrap: wrap; }
.btn { padding: 10px 20px; border-radius: 40px; border: none; font-weight: 600; cursor: pointer; font-size: 14px; }
.btn-primary { background: linear-gradient(135deg, var(--primary-color), var(--secondary-color)); color: white; }
.btn-secondary { background: #6c757d; color: white; }
.btn-danger { background: #dc3545; color: white; }
.result-summary { background: var(--bg-info); border-radius: 20px; padding: 20px; margin-top: 25px; text-align: center; display: none; }
.result-stats { display: flex; justify-content: center; gap: 30px; margin: 20px 0; }
.stat-value { font-size: 32px; font-weight: 700; color: var(--secondary-color); }
.admin-tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid var(--border-color); }
.tab-btn { background: none; border: none; padding: 10px 20px; font-size: 16px; font-weight: 600; cursor: pointer; color: var(--text-color); opacity: 0.6; }
.tab-btn.active { opacity: 1; border-bottom: 3px solid var(--secondary-color); }
.tab-content { display: none; }
.tab-content.active { display: block; }
.admin-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
.admin-table th, .admin-table td { border: 1px solid var(--border-color); padding: 10px; text-align: center; }
.admin-table th { background: var(--primary-color); color: white; }
.theme-toggle {
  position: fixed; top: 20px; right: 20px; width: 44px; height: 44px; border-radius: 50%;
  background: rgba(255,255,255,0.12); backdrop-filter: blur(12px); color: white; font-size: 20px;
  cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 100; display: none;
}
.theme-toggle.show { display: flex; }
footer { text-align: center; margin-top: 30px; font-size: 13px; color: var(--text-color); opacity: 0.6; border-top: 1px solid var(--border-color); padding-top: 18px; }
.modal {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; visibility: hidden; opacity: 0; transition: 0.2s;
}
.modal.show { visibility: visible; opacity: 1; }
.modal-content { background: var(--bg-card); padding: 25px; border-radius: 20px; width: 90%; max-width: 400px; color: var(--text-color); }
.modal-content h3 { margin-bottom: 15px; }
.modal-content input { width: 100%; padding: 10px; margin-bottom: 15px; border-radius: 12px; border: 1px solid var(--border-color); background: var(--bg-option); color: var(--text-color); }
.modal-buttons { display: flex; justify-content: flex-end; gap: 10px; }
@media (max-width: 600px) { .quiz-wrapper, .admin-wrapper { padding: 18px; } .nav-btn { width: 36px; height: 36px; } }
</style>
</head>
<body>
<div id="login-screen">
  <div class="portal"></div>
  <div class="portal-light" id="portalLight"></div>
  <div class="login-card">
    <div class="login-icon">π</div>
    <div class="login-title">Trắc Nghiệm Toán</div>
    <div class="login-subtitle">14 Chuyên đề</div>
    <div class="field"><input type="text" id="loginUsername" placeholder=" "><label>Mã số / Tên đăng nhập</label></div>
    <div class="field"><input type="password" id="loginPassword" placeholder=" "><label>Mật khẩu</label></div>
    <button class="login-btn" id="loginBtn">Đăng nhập →</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>
<button class="theme-toggle" id="themeToggle">🌙</button>
<div id="app-container"></div>

<script>
// ========== DỮ LIỆU NGƯỜI DÙNG ==========
const DEFAULT_USERS = [
  { id: "2608001", username: "2608001", password: "123", fullname: "Nguyễn Văn A", role: "student" },
  { id: "2608002", username: "2608002", password: "123", fullname: "Trần Thị B", role: "student" },
  { id: "admin", username: "admin", password: "123", fullname: "Giáo viên", role: "admin" }
];
function loadUsers() {
  const stored = localStorage.getItem('users_list');
  if (stored) return JSON.parse(stored);
  localStorage.setItem('users_list', JSON.stringify(DEFAULT_USERS));
  return [...DEFAULT_USERS];
}
function saveUsers(users) { localStorage.setItem('users_list', JSON.stringify(users)); }

// ========== CÂU HỎI CHUYÊN ĐỀ 1 (40 câu, đã sắp xếp lại) ==========
// 15 câu đầu (bài tập trên lớp) gồm 7 câu CSC + 8 câu CSN, dễ, áp dụng công thức.
// 25 câu sau (bài tập về nhà) giữ nguyên thứ tự cũ (từ câu 16 đến 40 trong bản gốc).
const allQuestionsCh1 = [
  // === PHẦN DỄ: BÀI TẬP TRÊN LỚP (15 câu) ===
  // CSC (7 câu)
  { text: "Cho cấp số cộng 2;5;8;11;14... Công sai?", options: ["A. -3", "B. 3", "C. 2", "D. 14"], correct: 1, explanation: "d = 5-2 = 3." },
  { text: "CSC có u₁ = 9, d = 2. Giá trị u₂ là?", options: ["A. 11", "B. 9/2", "C. 18", "D. 7"], correct: 0, explanation: "u₂ = 9 + 2 = 11." },
  { text: "CSC có u₁ = 5, u₂ = 10. Công sai d = ?", options: ["A. -5", "B. 5", "C. 2", "D. 15"], correct: 1, explanation: "d = 10 - 5 = 5." },
  { text: "CSC có u₁ = 2, u₇ = -10. Công sai d = ?", options: ["A. 2", "B. 3", "C. -1", "D. -2"], correct: 3, explanation: "u₇ = 2 + 6d = -10 ⇒ 6d = -12 ⇒ d = -2." },
  { text: "CSC có u₁ = 4, d = 8. Số hạng u₂₀ = ?", options: ["A. 156", "B. 165", "C. 12", "D. 245"], correct: 0, explanation: "u₂₀ = 4 + 19·8 = 156." },
  { text: "CSC có u₁ = 2, u₅ = 14. Công sai d = ?", options: ["A. 3", "B. -3", "C. 4", "D. -4"], correct: 0, explanation: "u₅ = 2 + 4d = 14 ⇒ 4d = 12 ⇒ d = 3." },
  { text: "CSC có u₁ = 1, u₄ = -26. Công sai d = ?", options: ["A. -27", "B. -9", "C. -26", "D. ∛(-26)"], correct: 1, explanation: "u₄ = 1 + 3d = -26 ⇒ 3d = -27 ⇒ d = -9." },
  // CSN (8 câu)
  { text: "CSN có u₁ = 3, q = 2. Giá trị u₂ = ?", options: ["A. 8", "B. 9", "C. 6", "D. 3/2"], correct: 2, explanation: "u₂ = 3·2 = 6." },
  { text: "CSN có u₁ = 2, u₂ = 6. Công bội q = ?", options: ["A. 3", "B. -4", "C. 4", "D. 1/3"], correct: 0, explanation: "q = 6/2 = 3." },
  { text: "CSN có u₁ = 3, u₂ = 1. Công bội q = ?", options: ["A. 1/3", "B. -2", "C. 3", "D. 2"], correct: 0, explanation: "q = 1/3." },
  { text: "CSN có u₁ = 5, q = -1. Số hạng u₆ = ?", options: ["A. 5", "B. -5", "C. 10", "D. -10"], correct: 1, explanation: "u₆ = 5·(-1)⁵ = -5." },
  { text: "CSN có u₁ = 3, q = -2. Số hạng u₅ = ?", options: ["A. -6", "B. -5", "C. 48", "D. -24"], correct: 2, explanation: "u₅ = 3·(-2)⁴ = 48." },
  { text: "CSN có u₁ = 2, q = 3. Giá trị u₃ = ?", options: ["A. 6", "B. 12", "C. 18", "D. 54"], correct: 2, explanation: "u₃ = 2·3² = 18." },
  { text: "CSN có u₂ = 6, u₃ = 18. Công bội q = ?", options: ["A. 2", "B. 3", "C. 1/3", "D. 4"], correct: 1, explanation: "q = 18/6 = 3." },
  { text: "CSN có u₁ = 4, q = 1/2. Số hạng u₃ = ?", options: ["A. 1", "B. 2", "C. 3", "D. 4"], correct: 0, explanation: "u₃ = 4·(1/2)² = 1." },
  // === PHẦN CÒN LẠI: BÀI TẬP VỀ NHÀ (25 câu, từ câu 16 đến 40 trong bản gốc) ===
  { text: "CSC u₁=3, d=-3, tổng 10 số đầu?", options: ["A. 26", "B. -26", "C. -105", "D. 105"], correct: 2, explanation: "S₁₀ = 5·(6-27) = -105." },
  { text: "CSC u₁=1, d=2, S₁₀=?", options: ["A. 110", "B. 100", "C. 21", "D. 19"], correct: 1, explanation: "S₁₀ = 5·(2+18)=100." },
  { text: "CSC u₁=3, d=2, tổng 2019 số đầu?", options: ["A. 4 080 399", "B. 4 800 399", "C. 4 399 080", "D. 8 154 741"], correct: 0, explanation: "S₂₀₁₉ = 2019·2021 = 4 080 399." },
  { text: "CSC u₁=1/3, d=-1, Sₙ=-425, n=?", options: ["A. 30", "B. 60", "C. 45", "D. 15"], correct: 0, explanation: "n=30." },
  { text: "uₙ=2n+1, số hạng thứ 2019?", options: ["A. 4039", "B. 4390", "C. 4930", "D. 4093"], correct: 0, explanation: "u₂₀₁₉ = 4039." },
  { text: "CSC u₁=2, d=9, số 2018 là hạng thứ mấy?", options: ["A. 226", "B. 225", "C. 223", "D. 224"], correct: 1, explanation: "n=225." },
  { text: "CSC u₄+u₁₆=48, u₁₀=?", options: ["A. 438", "B. 24", "C. 96", "D. 72"], correct: 1, explanation: "u₁₀=24." },
  { text: "CSC u₅+u₇=19, u₂+u₁₀=?", options: ["A. 38", "B. 29", "C. 12", "D. 19"], correct: 3, explanation: "=19." },
  { text: "CSC u₉=5u₂, u₁₃=2u₆+5, u₁,d?", options: ["A. -3,4", "B. 3,4", "C. 4,3", "D. -4,3"], correct: 1, explanation: "u₁=3,d=4." },
  { text: "Dãy nào là CSC?", options: ["A. 5ⁿ", "B. 2-5n", "C. 5ⁿ-2", "D. 5+n²"], correct: 1, explanation: "2-5n là CSC." },
  { text: "Dãy nào là CSC?", options: ["A. 3·2ⁿ", "B. 3-2n", "C. 2ⁿ+3", "D. 2+n³"], correct: 1, explanation: "3-2n là CSC." },
  { text: "CSC u₁₀=30, u₂₀=80, d=?", options: ["A. 5", "B. 10", "C. 50", "D. 110"], correct: 0, explanation: "d=5." },
  { text: "CSC u₁=5, S₅₀=5150, uₙ=?", options: ["A. 1+4n", "B. 5n", "C. 3+2n", "D. 2+3n"], correct: 0, explanation: "uₙ=4n+1." },
  { text: "Ba số x,y,z lập CSC, x+y+z=15, xyz=80, y=?", options: ["A. 4", "B. 5", "C. 6", "D. 8"], correct: 1, explanation: "y=5." },
  { text: "Dãy nào không là CSN?", options: ["A. 1;-3;9;-27;54", "B. 1;2;4;8;16", "C. 1;-1;1;-1;1", "D. 1;-2;4;-8;16"], correct: 0, explanation: "q không đều." },
  { text: "CSN u₂=6, u₅=162, q>0, q=?", options: ["A. 2", "B. 3", "C. 4", "D. 6"], correct: 1, explanation: "q=3." },
  { text: "CSN u₃=12, u₆=96, S₆=?", options: ["A. 189", "B. 378", "C. 126", "D. 252"], correct: 0, explanation: "S₆=189." },
  { text: "CSN u₁=2, q=3, u₂₀₁₉=?", options: ["A. 2·3²⁰¹⁸", "B. 3·2²⁰¹⁸", "C. 2·3²⁰¹⁹", "D. 3·2²⁰¹⁹"], correct: 0, explanation: "2·3²⁰¹⁸." },
  { text: "CSN u₁=3, q=2, Sₙ=21, n=?", options: ["A. 10", "B. 3", "C. 7", "D. Không"], correct: 1, explanation: "n=3." },
  { text: "CSN uₙ=3ⁿ, q=?", options: ["A. -3", "B. 1/3", "C. ±3", "D. 3"], correct: 3, explanation: "q=3." },
  { text: "CSN u₁=2, u₆=486, q=?", options: ["A. 3", "B. 5", "C. 3/2", "D. 2/3"], correct: 0, explanation: "q=3." },
  { text: "CSN q>1, u₂=-3, u₁+u₂+u₃=-13, u₁,q?", options: ["A. 1,3", "B. -1,-3", "C. -1,3", "D. 1,-3"], correct: 2, explanation: "u₁=-1, q=3." },
  { text: "CSN u₄-u₂=54, u₅-u₃=108, u₁,q?", options: ["A. 9,2", "B. 9,-2", "C. -9,-2", "D. -9,2"], correct: 0, explanation: "u₁=9,q=2." },
  { text: "CSN u₄+u₆=-540, u₃+u₅=180, S₂₁=?", options: ["A. ½(3²¹+1)", "B. 3²¹-1", "C. 1-3²¹", "D. -½(3²¹+1)"], correct: 0, explanation: "S₂₁=(3²¹+1)/2." },
  { text: "Vi khuẩn tăng gấp đôi, sau 5p có 64000, hỏi sau bao lâu có 2048000?", options: ["A. 10", "B. 11", "C. 26", "D. 50"], correct: 0, explanation: "t=10 phút." }
];

// Chia làm 2 phần: 15 câu đầu (bài tập trên lớp), 25 câu sau (bài tập về nhà)
const classQuestions = allQuestionsCh1.slice(0, 15);
const homeQuestions = allQuestionsCh1.slice(15, 40);

// Cấu trúc các chuyên đề (hiện tại chỉ có chuyên đề 1, có thể mở rộng)
const topics = [
  { id: 1, name: "Chuyên đề 1: Cấp số cộng - Cấp số nhân", parts: [
    { id: "class", name: "Bài tập trên lớp", questions: classQuestions },
    { id: "home", name: "Bài tập về nhà", questions: homeQuestions }
  ] }
];

// ========== LƯU KẾT QUẢ HỌC SINH ==========
function saveStudentResult(studentId, topicId, partId, result) {
  const allResults = JSON.parse(localStorage.getItem('quiz_results') || '{}');
  if (!allResults[studentId]) allResults[studentId] = {};
  if (!allResults[studentId][topicId]) allResults[studentId][topicId] = {};
  allResults[studentId][topicId][partId] = { ...result, timestamp: new Date().toLocaleString('vi-VN') };
  localStorage.setItem('quiz_results', JSON.stringify(allResults));
}
function getStudentResult(studentId, topicId, partId) {
  const allResults = JSON.parse(localStorage.getItem('quiz_results') || '{}');
  return allResults[studentId]?.[topicId]?.[partId] || null;
}
function getAllResultsForTopic(topicId, partId) {
  const allResults = JSON.parse(localStorage.getItem('quiz_results') || '{}');
  const results = {};
  for (const [sid, topics] of Object.entries(allResults)) {
    if (topics[topicId] && topics[topicId][partId]) {
      results[sid] = topics[topicId][partId];
    }
  }
  return results;
}

// ========== QUIZ LOGIC ==========
let currentStudent = null;
let currentTopic = null;
let currentPart = null;
let currentQuestions = [];
let currentIndex = 0;
let userAnswers = [];
let flags = [];
let submitted = false;
let startTime = null;
let timerInterval = null;

function renderQuiz() {
  const container = document.getElementById('app-container');
  container.innerHTML = `
    <div class="quiz-wrapper">
      <div class="topic-selector">
        <div class="topic-buttons" id="topicButtons"></div>
        <div class="part-buttons" id="partButtons"></div>
      </div>
      <div class="quiz-header">
        <div class="quiz-title">📘 ${currentTopic.name} - ${currentPart.name}</div>
        <div class="quiz-meta">Học sinh: ${currentStudent.fullname} (${currentStudent.username})</div>
      </div>
      <div class="progress-bar">
        <div class="progress-label"><span>Tiến độ</span><span id="answeredPercent">0%</span></div>
        <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
      </div>
      <div id="navGrid" class="nav-grid"></div>
      <div id="currentQuestion"></div>
      <div class="navigation-buttons">
        <button class="btn btn-secondary" id="prevBtn">◀ Câu trước</button>
        <button class="btn btn-secondary" id="nextBtn">Câu tiếp theo ▶</button>
      </div>
      <div class="action-buttons">
        <button class="btn btn-primary" id="submitBtn">📝 NỘP BÀI</button>
        <button class="btn btn-secondary" id="resetBtn">🔄 LÀM LẠI</button>
        <button class="btn btn-secondary" id="changePwdBtn">🔑 ĐỔI MẬT KHẨU</button>
        <button class="btn btn-secondary" id="logoutBtn">🚪 ĐĂNG XUẤT</button>
      </div>
      <div id="resultSummary" class="result-summary"></div>
      <footer>🎯 ĐẬU NV1 CÙNG ANH TIẾN ĐẠT</footer>
    </div>
  `;
  renderTopicSelector();
  renderNavGrid();
  renderCurrentQuestion();
  updateProgress();
  startTimer();
  attachQuizEvents();
}

function renderTopicSelector() {
  const topicContainer = document.getElementById('topicButtons');
  topicContainer.innerHTML = '';
  topics.forEach(topic => {
    const btn = document.createElement('button');
    btn.textContent = topic.name;
    btn.className = 'topic-btn';
    if (currentTopic && currentTopic.id === topic.id) btn.classList.add('active');
    btn.onclick = () => {
      if (submitted) return;
      currentTopic = topic;
      currentPart = topic.parts[0];
      currentQuestions = currentPart.questions;
      resetQuizState();
      renderQuiz();
    };
    topicContainer.appendChild(btn);
  });
  const partContainer = document.getElementById('partButtons');
  partContainer.innerHTML = '';
  if (currentTopic) {
    currentTopic.parts.forEach(part => {
      const btn = document.createElement('button');
      btn.textContent = part.name;
      btn.className = 'part-btn';
      if (currentPart && currentPart.id === part.id) btn.classList.add('active');
      btn.onclick = () => {
        if (submitted) return;
        currentPart = part;
        currentQuestions = part.questions;
        resetQuizState();
        renderQuiz();
      };
      partContainer.appendChild(btn);
    });
  }
}

function resetQuizState() {
  submitted = false;
  currentIndex = 0;
  userAnswers = new Array(currentQuestions.length).fill(null);
  flags = new Array(currentQuestions.length).fill(false);
  startTime = Date.now();
  clearLocalState();
}

function renderNavGrid() {
  const nav = document.getElementById('navGrid');
  nav.innerHTML = '';
  for (let i = 0; i < currentQuestions.length; i++) {
    const btn = document.createElement('button');
    btn.textContent = (i+1).toString();
    btn.className = 'nav-btn';
    if (userAnswers[i] !== null) btn.classList.add('answered');
    if (i === currentIndex) btn.classList.add('active');
    if (flags[i]) btn.classList.add('flagged');
    btn.onclick = () => { if (!submitted) { currentIndex = i; renderCurrentQuestion(); updateNavActive(); saveLocalState(); } };
    nav.appendChild(btn);
  }
}
function updateNavActive() {
  const btns = document.querySelectorAll('.nav-btn');
  btns.forEach((btn, idx) => {
    if (idx === currentIndex) btn.classList.add('active'); else btn.classList.remove('active');
    if (userAnswers[idx] !== null) btn.classList.add('answered'); else btn.classList.remove('answered');
    if (flags[idx]) btn.classList.add('flagged'); else btn.classList.remove('flagged');
  });
}
function toggleFlag() {
  if (submitted) return;
  flags[currentIndex] = !flags[currentIndex];
  renderCurrentQuestion();
  updateNavActive();
  saveLocalState();
}
function renderCurrentQuestion() {
  const q = currentQuestions[currentIndex];
  const container = document.getElementById('currentQuestion');
  const selected = userAnswers[currentIndex];
  const isFlagged = flags[currentIndex];
  container.innerHTML = `
    <div class="question-card">
      <div class="question-header">
        <div class="question-number">Câu ${currentIndex+1}</div>
        <button class="flag-btn" id="flagBtn">${isFlagged ? '🚩' : '🏁'}</button>
      </div>
      <div class="question-text">${q.text}</div>
      <div class="options" id="options-container">
        ${q.options.map((opt, idx) => `
          <label class="option">
            <input type="radio" name="current" value="${idx}" ${selected === idx ? 'checked' : ''} ${submitted ? 'disabled' : ''}>
            <span>${opt}</span>
          </label>
        `).join('')}
      </div>
      <div class="answer-result" id="answer-result-current"></div>
    </div>
  `;
  if (!submitted) {
    document.querySelectorAll('#options-container input').forEach(radio => {
      radio.addEventListener('change', (e) => {
        userAnswers[currentIndex] = parseInt(e.target.value);
        updateProgress();
        updateNavActive();
        saveLocalState();
      });
    });
    const flagBtn = document.getElementById('flagBtn');
    if (flagBtn) flagBtn.onclick = toggleFlag;
  } else showResultForCurrent();
}
function showResultForCurrent() {
  const q = currentQuestions[currentIndex];
  const choice = userAnswers[currentIndex];
  const resultDiv = document.getElementById('answer-result-current');
  const correctLetter = String.fromCharCode(65+q.correct);
  if (choice !== null) {
    const isCorrect = (choice === q.correct);
    resultDiv.className = isCorrect ? 'answer-result correct' : 'answer-result wrong';
    resultDiv.innerHTML = isCorrect ? `<strong>✅ Đúng</strong><div class="explanation">${q.explanation}</div>` : `<strong>❌ Sai. Đáp án đúng: ${correctLetter}</strong><div class="explanation">${q.explanation}</div>`;
  } else {
    resultDiv.className = 'answer-result wrong';
    resultDiv.innerHTML = `<strong>⚠️ Chưa trả lời. Đáp án đúng: ${correctLetter}</strong><div class="explanation">${q.explanation}</div>`;
  }
  resultDiv.style.display = 'block';
}
function updateProgress() {
  const answered = userAnswers.filter(a => a !== null).length;
  const percent = Math.round((answered/currentQuestions.length)*100);
  document.getElementById('answeredPercent').innerText = `${percent}%`;
  document.getElementById('progressFill').style.width = `${percent}%`;
}
function startTimer() { if (timerInterval) clearInterval(timerInterval); if (!startTime) startTime = Date.now(); timerInterval = setInterval(()=>{}, 1000); }
function stopTimer() { if (timerInterval) clearInterval(timerInterval); timerInterval = null; }
function saveLocalState() {
  const state = { userAnswers, flags, currentIndex, startTime, submitted };
  localStorage.setItem(`quiz_state_${currentStudent.username}_${currentTopic.id}_${currentPart.id}`, JSON.stringify(state));
}
function loadLocalState() {
  const saved = localStorage.getItem(`quiz_state_${currentStudent.username}_${currentTopic.id}_${currentPart.id}`);
  if (!saved) return false;
  try {
    const state = JSON.parse(saved);
    userAnswers = state.userAnswers || new Array(currentQuestions.length).fill(null);
    flags = state.flags || new Array(currentQuestions.length).fill(false);
    currentIndex = state.currentIndex || 0;
    startTime = state.startTime || null;
    submitted = state.submitted || false;
    return true;
  } catch(e) { return false; }
}
function clearLocalState() { localStorage.removeItem(`quiz_state_${currentStudent.username}_${currentTopic.id}_${currentPart.id}`); }
function submitQuiz() {
  if (submitted) return;
  stopTimer();
  let correctCount = 0;
  for (let i=0; i<currentQuestions.length; i++) if (userAnswers[i] === currentQuestions[i].correct) correctCount++;
  const total = currentQuestions.length;
  const percent = Math.round((correctCount/total)*100);
  submitted = true;
  document.querySelectorAll('#options-container input').forEach(r => r.disabled = true);
  showResultForCurrent();
  const summaryDiv = document.getElementById('resultSummary');
  summaryDiv.style.display = 'block';
  summaryDiv.innerHTML = `
    <h3>📊 KẾT QUẢ</h3>
    <div class="result-stats">
      <div class="stat"><div class="stat-value">${correctCount}</div><div class="stat-label">Đúng</div></div>
      <div class="stat"><div class="stat-value">${total-correctCount}</div><div class="stat-label">Sai</div></div>
      <div class="stat"><div class="stat-value">${percent}%</div><div class="stat-label">Tỷ lệ</div></div>
    </div>
    <button class="btn btn-secondary" id="retryBtn">🔁 Làm lại</button>
  `;
  document.getElementById('retryBtn').onclick = () => resetQuiz();
  saveStudentResult(currentStudent.username, currentTopic.id, currentPart.id, {
    fullname: currentStudent.fullname,
    score: correctCount,
    total: total,
    percent: percent,
    answers: userAnswers,
    time: Math.round((Date.now() - (startTime||Date.now()))/1000),
    submitted: true
  });
  if (percent >= 80) canvasConfetti({ particleCount: 200, spread: 100, origin: { y: 0.6 } });
  if (correctCount === total) canvasConfetti({ particleCount: 500, spread: 120, origin: { y: 0.5 } });
  saveLocalState();
}
function resetQuiz() {
  userAnswers.fill(null); flags.fill(false); submitted = false; currentIndex = 0; startTime = Date.now();
  clearLocalState(); renderNavGrid(); renderCurrentQuestion();
  document.getElementById('resultSummary').style.display = 'none';
  updateProgress(); startTimer();
}
function nextQuestion() { if (currentIndex < currentQuestions.length-1) { currentIndex++; renderCurrentQuestion(); updateNavActive(); saveLocalState(); } }
function prevQuestion() { if (currentIndex > 0) { currentIndex--; renderCurrentQuestion(); updateNavActive(); saveLocalState(); } }

// ========== ĐỔI MẬT KHẨU ==========
function showChangePasswordModal() {
  let modal = document.getElementById('changePwdModal');
  if (!modal) {
    modal = document.createElement('div');
    modal.id = 'changePwdModal';
    modal.className = 'modal';
    modal.innerHTML = `
      <div class="modal-content">
        <h3>🔑 Đổi mật khẩu</h3>
        <input type="password" id="oldPwd" placeholder="Mật khẩu cũ">
        <input type="password" id="newPwd1" placeholder="Mật khẩu mới">
        <input type="password" id="newPwd2" placeholder="Xác nhận mật khẩu mới">
        <div class="modal-buttons">
          <button class="btn btn-secondary" id="cancelPwdBtn">Hủy</button>
          <button class="btn btn-primary" id="confirmPwdBtn">Xác nhận</button>
        </div>
      </div>
    `;
    document.body.appendChild(modal);
  }
  modal.classList.add('show');
  document.getElementById('oldPwd').value = '';
  document.getElementById('newPwd1').value = '';
  document.getElementById('newPwd2').value = '';
  const confirmHandler = () => {
    const old = document.getElementById('oldPwd').value;
    const new1 = document.getElementById('newPwd1').value;
    const new2 = document.getElementById('newPwd2').value;
    if (!old || !new1 || !new2) { alert('Vui lòng nhập đầy đủ thông tin'); return; }
    if (new1 !== new2) { alert('Mật khẩu mới không khớp'); return; }
    let users = loadUsers();
    const user = users.find(u => u.username === currentStudent.username);
    if (!user || user.password !== old) { alert('Mật khẩu cũ không đúng'); return; }
    user.password = new1;
    saveUsers(users);
    alert('Đổi mật khẩu thành công! Vui lòng đăng nhập lại.');
    modal.classList.remove('show');
    window.location.reload();
  };
  const cancelHandler = () => modal.classList.remove('show');
  const confirmBtn = document.getElementById('confirmPwdBtn');
  const cancelBtn = document.getElementById('cancelPwdBtn');
  confirmBtn.onclick = confirmHandler;
  cancelBtn.onclick = cancelHandler;
}
function attachQuizEvents() {
  document.getElementById('prevBtn').onclick = prevQuestion;
  document.getElementById('nextBtn').onclick = nextQuestion;
  document.getElementById('submitBtn').onclick = submitQuiz;
  document.getElementById('resetBtn').onclick = resetQuiz;
  document.getElementById('changePwdBtn').onclick = showChangePasswordModal;
  document.getElementById('logoutBtn').onclick = () => window.location.reload();
}

// ========== ADMIN DASHBOARD ==========
function renderAdminDashboard() {
  let users = loadUsers();
  const container = document.getElementById('app-container');
  container.innerHTML = `
    <div class="admin-wrapper">
      <div class="logout-btn" style="text-align:right"><button class="btn btn-secondary" id="adminLogoutBtn">🚪 Đăng xuất</button></div>
      <div class="admin-tabs">
        <button class="tab-btn active" data-tab="students">📋 Quản lý học sinh</button>
        <button class="tab-btn" data-tab="scores">📊 Bảng điểm</button>
      </div>
      <div id="tab-students" class="tab-content active">
        <h3>Danh sách học sinh</h3>
        <button class="btn btn-primary" id="addStudentBtn" style="margin-bottom:15px">➕ Thêm học sinh</button>
        <table class="admin-table" id="studentTable">
          <thead><tr><th>Mã số</th><th>Họ tên</th><th>Mật khẩu</th><th>Thao tác</th></tr></thead>
          <tbody id="studentTableBody"></tbody>
        </table>
      </div>
      <div id="tab-scores" class="tab-content">
        <h3>Bảng điểm theo chuyên đề và phần</h3>
        <div style="margin-bottom:15px">
          <select id="topicSelectAdmin">
            ${topics.map(t => `<option value="${t.id}">${t.name}</option>`).join('')}
          </select>
          <select id="partSelectAdmin">
            <option value="class">Bài tập trên lớp</option>
            <option value="home">Bài tập về nhà</option>
          </select>
          <button id="refreshScoresBtn" class="btn btn-secondary">Xem điểm</button>
        </div>
        <table class="admin-table" id="scoreTable">
          <thead><tr><th>Mã số</th><th>Họ tên</th><th>Điểm</th><th>Tỷ lệ</th><th>Thời gian nộp</th></tr></thead>
          <tbody id="scoreTableBody"></tbody>
        </table>
      </div>
    </div>
  `;
  function renderStudentTable() {
    const usersList = loadUsers().filter(u => u.role === 'student');
    const tbody = document.getElementById('studentTableBody');
    tbody.innerHTML = '';
    usersList.forEach(u => {
      const row = tbody.insertRow();
      row.insertCell(0).innerText = u.username;
      row.insertCell(1).innerText = u.fullname;
      row.insertCell(2).innerHTML = `<input type="text" value="${u.password}" style="width:80px" class="edit-pwd" data-username="${u.username}">`;
      const actions = row.insertCell(3);
      const saveBtn = document.createElement('button'); saveBtn.innerText = '💾 Lưu'; saveBtn.className = 'btn btn-secondary'; saveBtn.style.marginRight='5px'; saveBtn.style.padding='4px 8px';
      const delBtn = document.createElement('button'); delBtn.innerText = '🗑️ Xóa'; delBtn.className = 'btn btn-danger'; delBtn.style.padding='4px 8px';
      actions.appendChild(saveBtn); actions.appendChild(delBtn);
      saveBtn.onclick = () => { const newPwd = row.cells[2].querySelector('input').value; updateStudentPassword(u.username, newPwd); renderStudentTable(); alert('Đã cập nhật mật khẩu'); };
      delBtn.onclick = () => { if(confirm(`Xóa học sinh ${u.fullname}?`)) deleteStudent(u.username); };
    });
  }
  function renderScoreTable() {
    const topicId = document.getElementById('topicSelectAdmin').value;
    const partId = document.getElementById('partSelectAdmin').value;
    const results = getAllResultsForTopic(parseInt(topicId), partId);
    const usersList = loadUsers().filter(u => u.role === 'student');
    const tbody = document.getElementById('scoreTableBody');
    tbody.innerHTML = '';
    for (let u of usersList) {
      const res = results[u.username];
      const row = tbody.insertRow();
      row.insertCell(0).innerText = u.username;
      row.insertCell(1).innerText = u.fullname;
      if (res) {
        row.insertCell(2).innerText = `${res.score}/${res.total}`;
        row.insertCell(3).innerText = `${res.percent}%`;
        row.insertCell(4).innerText = res.timestamp || '';
      } else {
        row.insertCell(2).innerText = 'Chưa làm';
        row.insertCell(3).innerText = '0%';
        row.insertCell(4).innerText = '';
      }
    }
  }
  function updateStudentPassword(username, newPwd) {
    let users = loadUsers();
    const idx = users.findIndex(u => u.username === username);
    if (idx !== -1) { users[idx].password = newPwd; saveUsers(users); }
  }
  function deleteStudent(username) {
    let users = loadUsers();
    users = users.filter(u => u.username !== username);
    saveUsers(users);
    const allResults = JSON.parse(localStorage.getItem('quiz_results') || '{}');
    delete allResults[username];
    localStorage.setItem('quiz_results', JSON.stringify(allResults));
    renderStudentTable();
  }
  const addBtn = document.getElementById('addStudentBtn');
  addBtn.onclick = () => {
    let newId = prompt('Nhập mã số học sinh (VD: 2608003):');
    if (!newId) return;
    let users = loadUsers();
    if (users.some(u => u.username === newId)) { alert('Mã số đã tồn tại!'); return; }
    let fullname = prompt('Nhập họ tên học sinh:');
    if (!fullname) fullname = newId;
    let password = prompt('Nhập mật khẩu mặc định (VD: 123):') || '123';
    users.push({ id: newId, username: newId, password: password, fullname: fullname, role: 'student' });
    saveUsers(users);
    renderStudentTable();
  };
  const tabs = document.querySelectorAll('.tab-btn');
  tabs.forEach(btn => {
    btn.onclick = () => {
      tabs.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      document.getElementById(`tab-${btn.dataset.tab}`).classList.add('active');
      if (btn.dataset.tab === 'scores') renderScoreTable();
      else renderStudentTable();
    };
  });
  document.getElementById('refreshScoresBtn').onclick = renderScoreTable;
  renderStudentTable();
  renderScoreTable();
  document.getElementById('adminLogoutBtn').onclick = () => window.location.reload();
}

// ========== XỬ LÝ ĐĂNG NHẬP ==========
const loginScreen = document.getElementById('login-screen');
const appContainer = document.getElementById('app-container');
const loginBtn = document.getElementById('loginBtn');
const loginError = document.getElementById('loginError');
function doLogin() {
  const username = document.getElementById('loginUsername').value.trim();
  const password = document.getElementById('loginPassword').value.trim();
  const users = loadUsers();
  const user = users.find(u => u.username === username && u.password === password);
  if (!user) {
    loginError.style.display = 'block';
    loginError.textContent = 'Sai tên đăng nhập hoặc mật khẩu!';
    setTimeout(() => loginError.style.display = 'none', 2000);
    return;
  }
  loginScreen.classList.add('exit');
  setTimeout(() => {
    loginScreen.style.display = 'none';
    document.getElementById('themeToggle').classList.add('show');
    appContainer.classList.add('visible');
    if (user.role === 'student') {
      currentStudent = user;
      currentTopic = topics[0];
      currentPart = currentTopic.parts[0];
      currentQuestions = currentPart.questions;
      loadLocalState();
      renderQuiz();
    } else if (user.role === 'admin') {
      renderAdminDashboard();
    }
  }, 780);
}
loginBtn.onclick = doLogin;
document.getElementById('loginUsername').addEventListener('keypress', e => { if (e.key === 'Enter') doLogin(); });
document.getElementById('loginPassword').addEventListener('keypress', e => { if (e.key === 'Enter') doLogin(); });

// Dark mode & portal light
const themeToggle = document.getElementById('themeToggle');
themeToggle.onclick = () => {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  document.documentElement.setAttribute('data-theme', isDark ? '' : 'dark');
  themeToggle.textContent = isDark ? '🌙' : '☀️';
};
document.addEventListener('mousemove', e => { const light = document.getElementById('portalLight'); if(light) { light.style.left = e.clientX + 'px'; light.style.top = e.clientY + 'px'; } });
if (typeof canvasConfetti === 'undefined') { const script = document.createElement('script'); script.src = 'https://cdn.jsdelivr.net/npm/canvas-confetti@1'; document.head.appendChild(script); }
</script>
