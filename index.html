<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chuyên đề 10: Phép Đếm - Hoán Vị - Chỉnh Hợp - Tổ Hợp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --bg: #f5f7fb;
            --card-bg: #ffffff;
            --text: #1e293b;
            --primary: #2563eb;
            --correct: #16a34a;
            --wrong: #dc2626;
            --explain-bg: #fffbeb;
            --explain-border: #f59e0b;
            --shadow: 0 4px 24px rgba(0,0,0,0.06);
            --radius: 16px;
            --transition: 0.2s ease;
        }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }
        .quiz-wrapper {
            max-width: 850px;
            margin: 0 auto;
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 30px 35px 40px;
        }
        .header-title {
            text-align: center;
            margin-bottom: 25px;
            border-bottom: 2px solid #e8f0fe;
            padding-bottom: 18px;
        }
        .header-title h1 {
            color: #1a73e8;
            font-weight: 700;
            font-size: 1.8rem;
            margin-bottom: 4px;
        }
        .header-title .subtitle {
            color: #64748b;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-size: 0.85rem;
        }
        .student-info {
            display: flex;
            justify-content: space-between;
            background: #f8fafc;
            padding: 12px 18px;
            border-radius: 10px;
            font-size: 0.95rem;
            color: #475569;
            margin-top: 15px;
            gap: 20px;
            flex-wrap: wrap;
        }
        .scoreboard {
            position: sticky;
            top: 15px;
            z-index: 999;
            background: #1e293b;
            color: #f1f5f9;
            padding: 12px 24px;
            border-radius: 50px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin-bottom: 30px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.25);
            font-weight: 600;
            font-size: 0.95rem;
            flex-wrap: wrap;
            gap: 10px;
        }
        .scoreboard span b {
            font-size: 1.2rem;
            margin-left: 4px;
        }
        .scoreboard .correct-score { color: #4ade80; }
        .scoreboard .wrong-score { color: #f87171; }
        .scoreboard .progress-score { color: #facc15; }

        .question-card {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            padding: 22px 24px;
            margin-bottom: 28px;
            transition: var(--transition);
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }
        .question-card:hover {
            box-shadow: 0 4px 16px rgba(0,0,0,0.05);
        }
        .question-number {
            font-weight: 700;
            color: #2563eb;
            font-size: 1rem;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .question-number .badge-type {
            font-size: 0.7rem;
            background: #eff6ff;
            color: #1e40af;
            padding: 3px 10px;
            border-radius: 20px;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        .question-text {
            font-weight: 600;
            font-size: 1.05rem;
            margin-bottom: 16px;
            color: #1e293b;
            line-height: 1.5;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .option-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            text-align: left;
            padding: 12px 18px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            background: #fafbfc;
            cursor: pointer;
            transition: all 0.15s ease;
            font-size: 1rem;
            color: #334155;
            position: relative;
        }
        .option-btn:hover:not([disabled]) {
            background: #eff6ff;
            border-color: #3b82f6;
            transform: translateY(-1px);
        }
        .option-btn .opt-label {
            font-weight: 700;
            color: #64748b;
            font-size: 0.9rem;
            min-width: 24px;
        }
        .option-btn.correct {
            background: #dcfce7 !important;
            border-color: #16a34a !important;
            color: #15803d;
            font-weight: 600;
        }
        .option-btn.correct .opt-label {
            color: #15803d;
        }
        .option-btn.wrong {
            background: #fee2e2 !important;
            border-color: #dc2626 !important;
            color: #991b1b;
            font-weight: 600;
        }
        .option-btn.wrong .opt-label {
            color: #991b1b;
        }
        .option-btn[disabled] {
            cursor: default;
            opacity: 0.85;
        }

        .explanation-box {
            display: none;
            margin-top: 18px;
            padding: 18px 20px;
            border-radius: 12px;
            background: var(--explain-bg);
            border-left: 5px solid var(--explain-border);
        }
        .explanation-box .exp-section {
            margin-bottom: 12px;
        }
        .explanation-box .exp-section:last-child {
            margin-bottom: 0;
        }
        .exp-label {
            font-weight: 700;
            color: #b45309;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .exp-content {
            color: #44403c;
            line-height: 1.6;
            font-size: 0.95rem;
        }

        .reset-btn-container {
            text-align: center;
            margin-top: 30px;
        }
        .reset-btn {
            padding: 10px 28px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.95rem;
            background: white;
            border: 2px solid #cbd5e1;
            color: #475569;
            cursor: pointer;
            transition: var(--transition);
        }
        .reset-btn:hover {
            background: #f1f5f9;
            border-color: #64748b;
        }

        @media (max-width: 600px) {
            .quiz-wrapper {
                padding: 20px 18px;
            }
            .question-card {
                padding: 16px;
            }
            .option-btn {
                padding: 10px 14px;
                font-size: 0.9rem;
            }
            .scoreboard {
                font-size: 0.8rem;
                padding: 10px 16px;
                gap: 6px;
            }
        }
    </style>
</head>
<body>
    <div class="quiz-wrapper">
        <div class="header-title">
            <h1>📐 CHỦ ĐỀ 10: PHÉP ĐẾM - TỔ HỢP</h1>
            <div class="subtitle">Hệ Thống Giáo Dục Tâm Đức</div>
            <div class="student-info">
                <span>👤 Họ và tên: .......................................................</span>
                <span>📚 Lớp: ........................</span>
            </div>
        </div>

        <div class="scoreboard">
            <span>✅ Đúng: <b id="correct-score" class="correct-score">0</b></span>
            <span>❌ Sai: <b id="wrong-score" class="wrong-score">0</b></span>
            <span>📊 Tiến độ: <b id="progress" class="progress-score">0</b>/<span id="total-questions">50</span></span>
        </div>

        <div id="quiz-content"></div>

        <div class="reset-btn-container">
            <button class="reset-btn" onclick="resetQuiz()">🔄 Làm lại toàn bộ</button>
        </div>
    </div>

    <script>
        const quizData = [
            {
                q: "Giả sử bạn muốn mua một áo sơ mi cỡ 39 hoặc 40. Áo cỡ 39 có 5 màu khác nhau, áo cỡ 40 có 4 màu khác nhau. Hỏi có bao nhiêu sự lựa chọn?",
                a: ["9", "5", "4", "20"],
                correct: 0,
                sign: "Từ khóa 'HOẶC', thực hiện một hành động chọn duy nhất.",
                why: "Sử dụng QUY TẮC CỘNG vì đây là các phương án độc lập. Chọn áo cỡ 39 thì không chọn cỡ 40 và ngược lại, mỗi lựa chọn đều hoàn thành công việc.",
                detail: "Số cách chọn = 5 (màu cỡ 39) + 4 (màu cỡ 40) = 9 cách."
            },
            {
                q: "Một người có 4 cái quần, 6 cái áo, 3 chiếc cà vạt. Để chọn một cái quần hoặc một cái áo hoặc một cái cà vạt thì số cách chọn là?",
                a: ["13", "72", "12", "30"],
                correct: 0,
                sign: "Từ khóa 'HOẶC', chọn 1 vật duy nhất từ nhiều nhóm.",
                why: "Sử dụng QUY TẮC CỘNG vì các nhóm vật dụng (quần, áo, cà vạt) là riêng biệt. Việc chọn 1 món từ bất kỳ nhóm nào cũng kết thúc hành động.",
                detail: "Số cách chọn = 4 + 6 + 3 = 13 cách."
            },
            {
                q: "Trên bàn có 8 cây bút chì, 6 cây bút bi và 10 cuốn tập. Chọn một đồ vật duy nhất bất kỳ thì số cách chọn là?",
                a: ["24", "480", "14", "60"],
                correct: 0,
                sign: "Từ khóa 'HOẶC', 'DUY NHẤT'.",
                why: "Sử dụng QUY TẮC CỘNG. Tổng số vật phẩm có sẵn là tổng của từng loại.",
                detail: "Số cách chọn = 8 + 6 + 10 = 24 cách."
            },
            {
                q: "Một thí sinh chọn một đề tài từ: 8 đề tài lịch sử, 7 đề tài thiên nhiên, 10 đề tài con người và 6 đề tài văn hóa. Hỏi có bao nhiêu khả năng chọn?",
                a: ["31", "280", "420", "560"],
                correct: 0,
                sign: "Chọn 1 vật phẩm từ nhiều danh mục khác nhau.",
                why: "Sử dụng QUY TẮC CỘNG vì thí sinh chỉ được chọn duy nhất 1 đề tài.",
                detail: "Số khả năng = 8 + 7 + 10 + 6 = 31 cách."
            },
            {
                q: "Từ tỉnh A đến tỉnh B có thể đi bằng: ô tô (10 chuyến), tàu hỏa (5 chuyến), tàu thủy (3 chuyến), máy bay (2 chuyến). Hỏi có bao nhiêu cách đi?",
                a: ["20", "300", "18", "15"],
                correct: 0,
                sign: "Nhiều phương thức vận tải khác nhau để đi từ A đến B.",
                why: "Sử dụng QUY TẮC CỘNG vì mỗi chuyến đi là một lựa chọn độc lập để hoàn thành chặng đường.",
                detail: "Số cách đi = 10 + 5 + 3 + 2 = 20 cách."
            },
            {
                q: "Có 3 kiểu mặt đồng hồ và 4 kiểu dây. Hỏi có bao nhiêu cách chọn một chiếc đồng hồ gồm một mặt và một dây?",
                a: ["12", "7", "4", "16"],
                correct: 0,
                sign: "Từ khóa 'GỒM', công việc có 2 giai đoạn.",
                why: "Sử dụng QUY TẮC NHÂN vì để có 1 chiếc đồng hồ, ta bắt buộc phải thực hiện 2 bước liên tiếp: Chọn mặt VÀ chọn dây.",
                detail: "Số cách chọn = 3 (mặt) × 4 (dây) = 12 cách."
            },
            {
                q: "Một người có 4 cái quần, 6 cái áo, 3 chiếc cà vạt. Để chọn 'mỗi thứ một món' tạo thành bộ đồ thì có bao nhiêu cách?",
                a: ["72", "13", "12", "30"],
                correct: 0,
                sign: "Công việc có nhiều giai đoạn liên tiếp (Quần + Áo + Cà vạt).",
                why: "Sử dụng QUY TẮC NHÂN vì phải chọn đủ cả 3 loại món đồ mới thành một bộ.",
                detail: "Số cách chọn = 4 × 6 × 3 = 72 cách."
            },
            {
                q: "Từ thành phố A đến B có 6 con đường, từ B đến C có 7 con đường. Có bao nhiêu cách đi từ A đến C qua B?",
                a: ["42", "13", "48", "44"],
                correct: 0,
                sign: "Lộ trình chia làm 2 chặng liên tiếp A-B và B-C.",
                why: "Sử dụng QUY TẮC NHÂN vì muốn đi từ A đến C bắt buộc phải đi qua chặng 1 RỒI đi tiếp chặng 2.",
                detail: "Số cách đi = 6 × 7 = 42 cách."
            },
            {
                q: "An qua nhà Bình (4 đường), Bình qua nhà Cường (6 đường). Hỏi An có bao nhiêu cách đi đến nhà Cường qua nhà Bình?",
                a: ["24", "10", "12", "18"],
                correct: 0,
                sign: "Hành động liên tiếp qua điểm trung gian.",
                why: "Sử dụng QUY TẮC NHÂN.",
                detail: "Số cách đi = 4 × 6 = 24 cách."
            },
            {
                q: "Chọn thực đơn gồm: 1 món ăn (5 món), 1 tráng miệng (5 loại) và 1 nước uống (3 loại). Có bao nhiêu cách chọn?",
                a: ["75", "13", "100", "15"],
                correct: 0,
                sign: "Hành động gồm 3 bước liên tiếp.",
                why: "Sử dụng QUY TẮC NHÂN.",
                detail: "Số cách chọn = 5 × 5 × 3 = 75 cách."
            },
            {
                q: "Có bao nhiêu cách xếp khác nhau cho 5 người ngồi vào một bàn dài?",
                a: ["120", "5", "20", "25"],
                correct: 0,
                sign: "Xếp thứ tự toàn bộ n phần tử vào n vị trí.",
                why: "Sử dụng HOÁN VỊ vì ta lấy tất cả 5 người và sắp xếp thứ tự của họ trên bàn dài.",
                detail: "Số cách xếp = 5! = 5 × 4 × 3 × 2 × 1 = 120 cách."
            },
            {
                q: "Số cách sắp xếp 10 học sinh vào một dãy ghế hàng ngang có 10 chỗ ngồi là?",
                a: ["10!", "10", "100", "2^10"],
                correct: 0,
                sign: "Sắp xếp toàn bộ phần tử vào hàng ngang.",
                why: "Sử dụng HOÁN VỊ cho 10 phần tử.",
                detail: "Số cách xếp = P₁₀ = 10! = 3.628.800 cách."
            },
            {
                q: "Lập kế hoạch đi thăm 12 người bạn, mỗi ngày thăm 1 người trong 1 tuần (7 ngày). Hỏi có bao nhiêu kế hoạch?",
                a: ["3.991.680", "12!", "3.583.180", "7!"],
                correct: 0,
                sign: "Chọn k phần tử từ n phần tử và SẮP THỨ TỰ theo ngày.",
                why: "Sử dụng CHỈNH HỢP vì việc thăm bạn A vào thứ Hai khác với thăm bạn A vào thứ Ba (thứ tự quan trọng).",
                detail: "Số kế hoạch = A(12, 7) = 12! / (12-7)! = 12×11×10×9×8×7×6 = 3.991.680 cách."
            },
            {
                q: "Cho tập hợp 6 điểm phân biệt. Có bao nhiêu vectơ khác vectơ không có điểm đầu và cuối từ tập này?",
                a: ["30", "15", "36", "12"],
                correct: 0,
                sign: "Chọn 2 điểm và có phân biệt thứ tự (Điểm đầu - Điểm cuối).",
                why: "Sử dụng CHỈNH HỢP vì vectơ AB khác vectơ BA.",
                detail: "Số vectơ = A(6, 2) = 6 × 5 = 30 vectơ."
            },
            {
                q: "Có bao nhiêu cách mắc nối tiếp 4 bóng đèn được chọn từ 6 bóng đèn khác nhau?",
                a: ["360", "15", "24", "17280"],
                correct: 0,
                sign: "Chọn 4 vật từ 6 vật và sắp xếp thứ tự nối tiếp.",
                why: "Sử dụng CHỈNH HỢP vì thay đổi thứ tự các bóng đèn trong mạch nối tiếp tạo ra cách mắc khác nhau.",
                detail: "Số cách mắc = A(6, 4) = 6 × 5 × 4 × 3 = 360 cách."
            },
            {
                q: "Một cuộc thi có 8 vận động viên. Hỏi có bao nhiêu khả năng trao 3 giải: Nhất, Nhì, Ba?",
                a: ["336", "56", "24", "120"],
                correct: 0,
                sign: "Chọn 3 từ 8 và phân chia thứ hạng (thứ tự).",
                why: "Sử dụng CHỈNH HỢP vì các giải thưởng Nhất, Nhì, Ba là khác nhau.",
                detail: "Số khả năng = A(8, 3) = 8 × 7 × 6 = 336 cách."
            },
            {
                q: "Một ban chấp hành có 7 người, cần chọn 3 người vào 3 chức vụ: Bí thư, Phó bí thư, Ủy viên. Số cách chọn là?",
                a: ["210", "35", "180", "150"],
                correct: 0,
                sign: "Chọn người và phân công chức vụ khác nhau.",
                why: "Sử dụng CHỈNH HỢP vì vai trò mỗi người được chọn là khác nhau.",
                detail: "Số cách = A(7, 3) = 7 × 6 × 5 = 210 cách."
            },
            {
                q: "Xếp 5 bạn học sinh An, Bình, Chi, Dũng, Lệ vào ghế dài 5 chỗ sao cho bạn Chi luôn ngồi chính giữa. Có bao nhiêu cách?",
                a: ["24", "120", "60", "16"],
                correct: 0,
                sign: "Sắp xếp có vị trí cố định.",
                why: "Sử dụng HOÁN VỊ cho các vị trí còn lại. Chi đã cố định, ta xếp 4 bạn còn lại vào 4 chỗ trống.",
                detail: "Số cách = 4! = 4 × 3 × 2 × 1 = 24 cách."
            },
            {
                q: "Xếp 5 bạn học sinh sao cho bạn An và Dũng luôn ngồi ở hai đầu ghế. Hỏi có bao nhiêu cách?",
                a: ["12", "24", "120", "6"],
                correct: 0,
                sign: "Sắp xếp có điều kiện ở biên.",
                why: "Bước 1: Xếp An và Dũng vào 2 đầu (2! cách). Bước 2: Hoán vị 3 bạn còn lại vào giữa (3! cách). Dùng quy tắc nhân.",
                detail: "Số cách = 2! × 3! = 2 × 6 = 12 cách."
            },
            {
                q: "Lập danh sách sắp xếp thứ tự 5 cầu thủ trong số 11 cầu thủ để đá luân lưu. Có bao nhiêu cách?",
                a: ["55.440", "462", "554.440", "11!"],
                correct: 0,
                sign: "Chọn và sắp thứ tự thực hiện.",
                why: "Sử dụng CHỈNH HỢP vì thứ tự đá luân lưu quan trọng.",
                detail: "Số cách = A(11, 5) = 11 × 10 × 9 × 8 × 7 = 55.440 cách."
            },
            {
                q: "Một hộp đựng 12 viên bi. Có bao nhiêu cách lấy ra 6 viên bi bất kỳ?",
                a: ["924", "665.280", "720", "942"],
                correct: 0,
                sign: "Chọn một nhóm phần tử, KHÔNG quan tâm thứ tự.",
                why: "Sử dụng TỔ HỢP vì lấy ra 6 viên cùng lúc, viên nào trước viên nào sau không quan trọng.",
                detail: "Số cách = C(12, 6) = 924 cách."
            },
            {
                q: "Lớp học 40 học sinh. Chọn 3 học sinh đi tham gia vệ sinh công cộng. Hỏi có bao nhiêu cách?",
                a: ["9.880", "59.280", "2.300", "455"],
                correct: 0,
                sign: "Chọn nhóm người làm cùng một công việc.",
                why: "Sử dụng TỔ HỢP vì vai trò của 3 bạn là như nhau.",
                detail: "Số cách = C(40, 3) = 9.880 cách."
            },
            {
                q: "Một ban chấp hành đoàn 7 người, cần chọn ra 3 người vào ban thường vụ (không phân biệt chức vụ). Số cách là?",
                a: ["35", "210", "42", "50"],
                correct: 0,
                sign: "Chọn nhóm không phân cấp.",

        function renderQuiz() {
            const quizContent = document.getElementById('quiz-content');

                                  item.sign.includes('NHÂN') ? 'QUY TẮC NHÂN' :
                                  item.sign.includes('CỘNG') ? 'QUY TẮC CỘNG' : 'TỔNG HỢP';
                return `
                    <div class="question-card" id="card-${index}">
                        <div class="question-number">
                            📌 Câu ${index + 1}
                            <span class="badge-type">${typeLabel}</span>
                        </div>
                        <div class="question-text">${item.q}</div>
                        <div class="options" id="options-${index}">

                                <button class="option-btn" onclick="checkAnswer(${index}, ${optIdx}, this)">
                                    <span class="opt-label">${labels[optIdx]}.</span>
                                    <span>${opt}</span>
                                </button>
                            `).join('')}
                        </div>
                        <div class="explanation-box" id="exp-${index}">
                            <div class="exp-section">
                                <span class="exp-label">🎯 Dấu hiệu nhận biết:</span>
                                <div class="exp-content">${item.sign}</div>

                                <div class="exp-content">${item.why}</div>
                            </div>
                            <div class="exp-section">
                                <span class="exp-label">📝 Lời giải chi tiết:</span>
                                <div class="exp-content">${item.detail}</div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function checkAnswer(qIdx, optIdx, btn) {
            const card = document.getElementById(`card-${qIdx}`);
            const options = document.getElementById(`options-${qIdx}`).querySelectorAll('.option-btn');
            const expBox = document.getElementById(`exp-${qIdx}`);
            const correctIdx = quizData[qIdx].correct;

            // Ngăn chọn lại nếu đã trả lời
            if (options[0].disabled) return;
            options.forEach(b => b.disabled = true);
            answeredCount++;

            if (optIdx === correctIdx) {
                btn.classList.add('correct');
                correctCount++;
            } else {
                btn.classList.add('wrong');
                options[correctIdx].classList.add('correct');
                wrongCount++;
            }

            // Hiển thị giải thích
            expBox.style.display = 'block';

            // Cập nhật điểm
            document.getElementById('correct-score').textContent = correctCount;
            document.getElementById('wrong-score').textContent = wrongCount;
            document.getElementById('progress').textContent = answeredCount;

            // Cuộn nhẹ tới phần giải thích
            setTimeout(() => {
                expBox.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }, 150);
        }

        function resetQuiz() {
            correctCount = 0;
            wrongCount = 0;
            answeredCount = 0;
            document.getElementById('correct-score').textContent = '0';
            document.getElementById('wrong-score').textContent = '0';
            document.getElementById('progress').textContent = '0';
            renderQuiz();
            window.scrollTo({ top: 0, behavior: 'smooth' });
